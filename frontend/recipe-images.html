<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e2a3a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">
<title>菜谱图片中心</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--panel:#fff;--ink:#1a2332;--ink2:#5a6577;--ink3:#8a95a8;
  --line:#e6eaf0;--line2:#eef2f7;
  --brand:#0ea5a4;--brand-d:#0d8b8a;--brand-l:#e6f7f6;
  --warm:#f97316;--warm-l:#fff3ea;--red:#ef4444;
  --shadow:0 1px 3px rgba(20,40,80,.06),0 4px 16px rgba(20,40,80,.05);
}
body{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
.topbar{background:linear-gradient(110deg,#0e2a3a 0%,#134e4a 55%,#0d8b8a 100%);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand-logo{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#f97316,#fb923c);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.brand h1{font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand p{font-size:11.5px;color:#a7d4d3}
.back-btn{padding:9px 12px;border:1px solid rgba(255,255,255,.28);border-radius:8px;color:#fff;background:rgba(255,255,255,.08);font-size:12.5px;font-weight:600;flex-shrink:0;transition:.2s}
.back-btn:hover{background:rgba(255,255,255,.18)}
.shell{max-width:1180px;margin:0 auto;padding:20px 20px 48px}
.plan-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:6px 0 18px}
.eyebrow{font-size:11.5px;color:var(--brand-d);font-weight:700}
.plan-head h2{font-size:22px;margin-top:4px;line-height:1.3}
.plan-head p{font-size:12.5px;color:var(--ink2);margin-top:5px}
.count-chip{padding:7px 12px;background:var(--brand-l);color:var(--brand-d);border-radius:8px;font-size:12.5px;font-weight:700;white-space:nowrap}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.image-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
.image-wrap{position:relative;background:#f8f3e9;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;overflow:hidden}
.image-wrap img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
.image-wrap .placeholder{text-align:center;color:var(--ink3);padding:18px}
.image-wrap .placeholder .ph-emoji{font-size:54px;margin-bottom:10px}
.image-wrap .placeholder p{font-size:12.5px;font-weight:600}
.image-wrap .placeholder .hint{font-size:11px;margin-top:6px;color:#a8b3c5;font-weight:400}
.image-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:10px;flex:1}
.dish-line{display:flex;align-items:center;gap:7px;min-width:0}
.dish-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role{flex-shrink:0;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600;background:var(--warm-l);color:var(--warm)}
.image-actions{margin-top:auto;display:flex;gap:8px}
.dl-btn{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:36px;padding:8px 12px;border-radius:9px;background:var(--brand);color:#fff;font-size:12.5px;font-weight:700;transition:.2s}
.dl-btn:hover{background:var(--brand-d)}
.dl-btn:disabled{opacity:.6;cursor:wait}
.view-link{display:inline-flex;align-items:center;justify-content:center;min-height:36px;padding:8px 12px;border:1px solid rgba(13,139,138,.3);border-radius:9px;background:var(--brand-l);color:var(--brand-d);font-size:12.5px;font-weight:700;text-decoration:none;transition:.2s}
.view-link:hover{background:#d8f4f2}
.empty{min-height:300px;display:grid;place-items:center;text-align:center;color:var(--ink3);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:32px}
.empty .empty-icon{font-size:46px;opacity:.6;margin-bottom:10px}
.empty h3{font-size:16px;color:var(--ink)}
.empty p{font-size:12.5px;margin-top:6px}
.toast-stack{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:2000;width:calc(100% - 32px);max-width:440px;pointer-events:none}
.toast{display:flex;align-items:flex-start;gap:8px;max-width:100%;padding:11px 16px;border-radius:11px;background:#16233b;color:#e8eef7;font-size:12.5px;line-height:1.5;box-shadow:0 10px 30px rgba(9,18,35,.35);pointer-events:auto;transition:opacity .3s ease,transform .3s ease}
.toast.success{background:#0c5e50}
.toast.error{background:#7f1d1d}
.toast.hide{opacity:0;transform:translateY(8px)}
@media(max-width:640px){
  .topbar{padding:12px 14px}
  .brand p{display:none}
  .shell{padding:14px 12px 36px}
  .plan-head{flex-direction:column;align-items:flex-start;gap:10px}
  .gallery{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
  .image-actions{flex-direction:column}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><div class="brand-logo">🖼️</div><div><h1>菜谱图片中心</h1><p>AI 社区餐桌预测引擎 · 菜谱海报展示与下载</p></div></div>
  <button class="back-btn" onclick="goBack()">返回运营驾驶舱</button>
</header>
<main class="shell" id="main"><div class="empty"><div><div class="empty-icon">🖼️</div><h3>正在加载菜谱图片</h3><p>请稍候...</p></div></div></main>
<div class="toast-stack" id="toastStack" role="status" aria-live="polite"></div>
<script>
const planId=new URLSearchParams(location.search).get('plan_id');
const escapeHtml=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
let menus=[];

function goBack(){if(history.length>1){history.back();}else{location.href='/';}}

function showToast(message,type='info',duration=3400){
  const stack=document.getElementById('toastStack');
  const toast=document.createElement('div');
  toast.className=`toast ${type}`;
  toast.textContent=(type==='success'?'✅ ':type==='error'?'⚠️ ':'💡 ')+String(message||'');
  stack.appendChild(toast);
  while(stack.children.length>3) stack.firstElementChild.remove();
  setTimeout(()=>{toast.classList.add('hide');setTimeout(()=>toast.remove(),350);},duration);
}

/* 方案里存的图片地址以生成时的 SERVER_URL 为根；本站 /recipes/ 路径回落到当前访问源，换主机或端口也能打开 */
function resolveImageUrl(raw){
  const value=String(raw??'').trim();
  if(!value) return '';
  try{
    const url=new URL(value,location.origin);
    if(!['http:','https:'].includes(url.protocol)) return '';
    if(url.pathname.startsWith('/recipes/')) return url.pathname+url.search;
    return url.href;
  }catch(_error){
    return '';
  }
}

function extFromType(type){
  return {'image/png':'png','image/jpeg':'jpg','image/webp':'webp','image/gif':'gif'}[String(type||'').toLowerCase()]||'png';
}

function sanitizeFilename(name){
  return String(name||'').replace(/[\\/:*?"<>|\s]+/g,'_').replace(/^_+|_+$/g,'').slice(0,60)||'菜谱';
}

async function fetchImageBlob(src){
  const response=await fetch(src);
  if(!response.ok) throw new Error(`图片获取失败 (${response.status})`);
  return response.blob();
}

async function downloadImage(index,button){
  const menu=menus[index];
  const src=menu&&menu.imageSrc;
  if(!src) return;
  const originalText=button.textContent;
  button.disabled=true;
  button.textContent='下载中...';
  try{
    const blob=await fetchImageBlob(src);
    const objectUrl=URL.createObjectURL(blob);
    const anchor=document.createElement('a');
    anchor.href=objectUrl;
    anchor.download=`${sanitizeFilename(menu.dish)}_菜谱图.${extFromType(blob.type)}`;
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    setTimeout(()=>URL.revokeObjectURL(objectUrl),4000);
    showToast(`「${menu.dish}」菜谱图已开始下载`,'success');
  }catch(error){
    showToast('下载失败：'+error.message,'error');
  }finally{
    button.disabled=false;
    button.textContent=originalText;
  }
}

function imageLoadError(img,index){
  const menu=menus[index]||{};
  const wrap=img.parentElement;
  if(!wrap) return;
  wrap.innerHTML=`<div class="placeholder"><div class="ph-emoji">${escapeHtml((menu.emoji||'').trim()||'🍳')}</div><p>图片加载失败</p><div class="hint">文件可能已被清理，可回驾驶舱重新生成</div></div>`;
}

function renderEmpty(title,description){
  document.getElementById('main').innerHTML=`<div class="empty"><div><div class="empty-icon">📭</div><h3>${escapeHtml(title)}</h3><p>${escapeHtml(description)}</p></div></div>`;
}

function renderPage(plan){
  const result=plan.result||{};
  const store=plan.input_context?.store_info||{};
  menus=(Array.isArray(result.menus)?result.menus:[]).map(menu=>({
    dish:String(menu.dish||'未命名菜品'),
    role:String(menu.role||'推荐菜'),
    emoji:String(menu.emoji||''),
    imageSrc:resolveImageUrl(menu.recipe_image_url),
  }));
  if(!menus.length){
    renderEmpty('该方案暂无菜品','请返回运营驾驶舱重新生成方案。');
    return;
  }
  const imageCount=menus.filter(menu=>menu.imageSrc).length;
  const cards=menus.map((menu,index)=>{
    const visual=menu.imageSrc
      ?`<img src="${escapeHtml(menu.imageSrc)}" alt="${escapeHtml(menu.dish)}菜谱图" loading="lazy" onerror="imageLoadError(this,${index})">`
      :`<div class="placeholder"><div class="ph-emoji">${escapeHtml((menu.emoji||'').trim()||'🍳')}</div><p>尚未生成菜谱图</p><div class="hint">回运营驾驶舱为该菜品生成图片</div></div>`;
    const actions=menu.imageSrc
      ?`<div class="image-actions"><button type="button" class="dl-btn" onclick="downloadImage(${index},this)">⬇️ 下载图片</button><a class="view-link" href="${escapeHtml(menu.imageSrc)}" target="_blank" rel="noopener noreferrer">查看原图</a></div>`
      :'';
    return `<article class="image-card"><div class="image-wrap">${visual}</div><div class="image-body"><div class="dish-line"><span class="dish-name">${escapeHtml(menu.dish)}</span><span class="role">${escapeHtml(menu.role)}</span></div>${actions}</div></article>`;
  }).join('');
  document.getElementById('main').innerHTML=`
    <section class="plan-head">
      <div>
        <div class="eyebrow">${escapeHtml(plan.plan_date||'')} · ${escapeHtml(store.store_name||store.store_id||'当前门店')}</div>
        <h2>${escapeHtml(result.scenario_tag||'今日推荐方案')} · 菜谱图片</h2>
        <p>图片按当前方案实时读取；重新生成图片后刷新本页即可看到最新版本。</p>
      </div>
      <span class="count-chip">已生成 ${imageCount}/${menus.length} 张</span>
    </section>
    <section class="gallery">${cards}</section>`;
}

async function init(){
  if(!planId){
    renderEmpty('缺少推荐方案','请从运营驾驶舱或历史方案页进入。');
    return;
  }
  try{
    const response=await fetch(`/api/recommendations/${encodeURIComponent(planId)}`);
    if(!response.ok) throw new Error('方案不存在或已被清理');
    renderPage(await response.json());
  }catch(error){
    renderEmpty('无法读取该方案',error.message+'，请返回运营驾驶舱重新生成。');
  }
}
init();
</script>
</body>
</html>
