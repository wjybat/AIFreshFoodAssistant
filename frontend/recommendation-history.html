<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史推荐方案管理</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--canvas:#f4f6f9;--surface:#fff;--ink:#182332;--muted:#647184;--line:#e2e8f0;--teal:#0d8b8a;--teal-l:#e6f7f6;--orange:#ea6b24;--orange-l:#fff1e8;--green:#16865d;--green-l:#e8f7ef;--red:#c54035;--red-l:#fff0ed;--amber:#a96d06;--amber-l:#fff5df;--blue:#3979c9;--blue-l:#edf4ff;--shadow:0 2px 6px rgba(25,43,65,.06),0 12px 28px rgba(25,43,65,.07)}
body{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:var(--canvas);color:var(--ink);line-height:1.5}button{font:inherit;cursor:pointer;border:0;color:inherit}button:disabled{cursor:not-allowed;opacity:.6}
.shell{max-width:1540px;margin:0 auto;padding:20px 22px 42px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:0 0 18px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:11px}.brand-mark{width:38px;height:38px;display:grid;place-items:center;background:var(--teal);color:#fff;border-radius:8px;font-size:18px}.brand h1{font-size:18px;letter-spacing:0}.brand p{font-size:11px;color:var(--muted);margin-top:2px}.top-actions{display:flex;align-items:center;gap:10px}.count-chip{padding:7px 10px;background:var(--teal-l);color:var(--teal);border-radius:6px;font-size:12px;font-weight:800}.back-btn,.clear-btn{padding:9px 12px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:12px;font-weight:700}.back-btn{color:var(--muted)}.back-btn:hover{border-color:var(--teal);color:var(--teal)}.clear-btn{border-color:#f1c4bd;background:var(--red-l);color:var(--red)}.clear-btn:hover{background:#fde3de}
.intro{display:flex;align-items:end;justify-content:space-between;gap:20px;margin:26px 0 18px}.eyebrow{font-size:11px;color:var(--teal);font-weight:800}.intro h2{font-size:26px;line-height:1.25;margin-top:5px}.intro p{font-size:13px;color:var(--muted);margin-top:6px}.notice{min-height:20px;font-size:12px;color:var(--muted);text-align:right}.notice.error{color:var(--red)}.notice.success{color:var(--green)}
.workspace{display:grid;grid-template-columns:342px minmax(0,1fr);gap:16px;align-items:start}.history-nav,.content{background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.history-nav{overflow:hidden;position:sticky;top:18px}.nav-head{padding:15px 16px 13px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.nav-head h3{font-size:14px}.nav-head span{font-size:11px;color:var(--muted)}.history-list{max-height:calc(100vh - 214px);overflow-y:auto;padding:8px}.history-item{width:100%;text-align:left;background:transparent;border:1px solid transparent;border-radius:6px;padding:12px 11px;transition:.18s;margin-bottom:4px}.history-item:hover{background:#f8fafb;border-color:var(--line)}.history-item.active{background:var(--teal-l);border-color:#97d8d6}.history-item .item-date{font-size:11px;font-weight:800;color:var(--teal)}.history-item .item-store{font-size:13px;font-weight:800;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.history-item .item-plan{font-size:11px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.item-meta{display:flex;justify-content:space-between;gap:8px;margin-top:8px;font-size:10.5px;color:var(--muted)}.decision{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:800;white-space:nowrap}.decision.waiting{background:var(--amber-l);color:var(--amber)}.decision.accepted{background:var(--green-l);color:var(--green)}.decision.rejected{background:var(--red-l);color:var(--red)}
.content{min-height:580px}.empty{min-height:580px;display:grid;place-items:center;text-align:center;padding:36px;color:var(--muted)}.empty .empty-icon{font-size:44px;opacity:.65;margin-bottom:10px}.empty h3{font-size:16px;color:var(--ink)}.empty p{font-size:12px;margin-top:5px}.plan-head{padding:22px 24px 18px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,#fff 0%,#f3fcfb 100%)}.plan-context{display:flex;align-items:center;justify-content:space-between;gap:18px}.plan-context h3{font-size:22px;line-height:1.3;margin-top:4px}.plan-context p{font-size:12px;color:var(--muted);margin-top:5px}.plan-tools{display:flex;gap:8px;flex-shrink:0}.open-btn{padding:8px 10px;border-radius:6px;background:var(--teal);color:#fff;font-size:11.5px;font-weight:800}.open-btn:hover{background:#087372}.open-btn.secondary{background:#fff;color:var(--teal);border:1px solid #a9dcda}.open-btn.secondary:hover{background:var(--teal-l)}
.content-body{padding:20px 24px 28px}.section-title{font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}.section-title span{font-size:11px;font-weight:500;color:var(--muted)}.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:11px}.menu-card{border:1px solid var(--line);border-radius:7px;overflow:hidden;background:#fff}.dish-hero{height:68px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--teal-l),#f1fbf9);font-size:29px}.dish-body{padding:11px 12px}.dish-name{font-size:13px;font-weight:800}.dish-role{display:inline-block;margin-top:5px;padding:2px 6px;border-radius:4px;background:var(--orange-l);color:var(--orange);font-size:10px;font-weight:700}.dish-reason{font-size:11px;color:var(--muted);margin-top:7px;min-height:32px}.dish-price{font-size:13px;font-weight:800;color:var(--red);margin-top:8px}.dish-price del{font-size:10px;font-weight:500;color:var(--muted);margin-left:5px}.detail-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:12px;margin-top:18px}.detail-box{border:1px solid var(--line);border-radius:7px;padding:14px}.detail-box h4{font-size:12px;font-weight:800}.detail-box p{font-size:12px;color:var(--muted);margin-top:7px;white-space:pre-wrap;overflow-wrap:anywhere}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}.metric{padding:9px;background:#f7f9fb;border-radius:6px}.metric b{font-size:15px;color:var(--teal);display:block;overflow-wrap:anywhere}.metric span{font-size:10px;color:var(--muted);display:block;margin-top:3px}.tasks{margin-top:18px;border-top:1px solid var(--line);padding-top:18px}.task-list{display:grid;gap:7px}.task{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid #edf1f5}.task:last-child{border-bottom:0}.task-number{width:22px;height:22px;display:grid;place-items:center;border-radius:5px;background:var(--teal-l);color:var(--teal);font-size:10px;font-weight:800;flex-shrink:0}.task b{font-size:12px;display:block}.task span{font-size:11px;color:var(--muted);display:block;margin-top:2px}.raw-details{margin-top:18px;border-top:1px solid var(--line);padding-top:18px}.raw-details summary{font-size:12px;font-weight:800;cursor:pointer;color:var(--muted)}.raw-details pre{margin-top:10px;padding:12px;background:#172435;color:#d8e4ed;border-radius:6px;font:11.5px/1.65 "Cascadia Code","Fira Code",Consolas,monospace;white-space:pre-wrap;overflow-wrap:anywhere;max-height:310px;overflow:auto}
@media(max-width:900px){.shell{padding:16px}.workspace{grid-template-columns:1fr}.history-nav{position:static}.history-list{max-height:260px}.intro{align-items:flex-start;flex-direction:column}.notice{text-align:left}.detail-grid{grid-template-columns:1fr}}@media(max-width:620px){.topbar,.plan-context{align-items:flex-start;flex-direction:column}.top-actions{width:100%;flex-wrap:wrap}.plan-tools{width:100%;flex-wrap:wrap}.open-btn{flex:1}.plan-head,.content-body{padding-left:16px;padding-right:16px}.menu-grid{grid-template-columns:1fr}.intro h2{font-size:22px}}
</style>
</head>
<body>
<main class="shell">
  <header class="topbar">
    <div class="brand"><div class="brand-mark">🗂️</div><div><h1>历史推荐方案管理</h1><p>AI 社区餐桌预测引擎 · 门店日期归档</p></div></div>
    <div class="top-actions"><span class="count-chip" id="historyCount">0 个方案</span><button class="clear-btn" id="clearButton" onclick="clearHistory()">清空全部</button><button class="back-btn" onclick="location.href='/'">返回运营驾驶舱</button></div>
  </header>
  <section class="intro"><div><div class="eyebrow">SAVED RECOMMENDATION ARCHIVE</div><h2>已保存的生成菜谱方案</h2><p>每个门店与业务日期只保留一份当前方案；重新生成将覆盖该日期原有内容。</p></div><div class="notice" id="notice" role="status"></div></section>
  <section class="workspace">
    <aside class="history-nav"><div class="nav-head"><h3>选择门店与日期</h3><span id="navCount">0 条记录</span></div><div class="history-list" id="historyList"></div></aside>
    <article class="content" id="content"><div class="empty"><div><div class="empty-icon">🗂️</div><h3>正在读取历史方案</h3><p>请稍候...</p></div></div></article>
  </section>
</main>
<script>
const escapeHtml=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
let historyItems=[];let activePlanId=null;

function decisionLabel(value){return value==='accepted'?'已接受执行':value==='rejected'?'已拒绝执行':'待负责人确认';}
function decisionClass(value){return value==='accepted'?'accepted':value==='rejected'?'rejected':'waiting';}
function formatDateTime(value){if(!value)return '未知时间';const date=new Date(value);return Number.isNaN(date.getTime())?value:date.toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
function setNotice(message,type=''){const notice=document.getElementById('notice');notice.textContent=message;notice.className=`notice ${type}`;}

function renderHistoryList(){
  const list=document.getElementById('historyList');
  document.getElementById('historyCount').textContent=`${historyItems.length} 个方案`;
  document.getElementById('navCount').textContent=`${historyItems.length} 条记录`;
  if(!historyItems.length){list.innerHTML='<div class="empty" style="min-height:220px"><div><div class="empty-icon">📭</div><h3>暂无保存方案</h3><p>在运营驾驶舱生成后会自动归档。</p></div></div>';return;}
  list.innerHTML=historyItems.map(item=>`<button class="history-item ${item.plan_id===activePlanId?'active':''}" onclick="selectPlan('${escapeHtml(item.plan_id)}')"><div class="item-date">${escapeHtml(item.plan_date)}</div><div class="item-store">${escapeHtml(item.store_name)}</div><div class="item-plan">${escapeHtml(item.scenario_tag)}</div><div class="item-meta"><span>${item.menu_count} 道菜 · ${formatDateTime(item.created_at)}</span><span class="decision ${decisionClass(item.decision)}">${decisionLabel(item.decision)}</span></div></button>`).join('');
}

function renderEmpty(title,description){document.getElementById('content').innerHTML=`<div class="empty"><div><div class="empty-icon">📭</div><h3>${escapeHtml(title)}</h3><p>${escapeHtml(description)}</p></div></div>`;}
function renderPlan(plan){
  const result=plan.result||{};const store=plan.input_context?.store_info||{};const menus=Array.isArray(result.menus)?result.menus:[];const estimate=result.value_estimate||{};const tasks=Array.isArray(result.staff_instructions)?result.staff_instructions:[];
  const menuHtml=menus.length?menus.map(dish=>`<div class="menu-card"><div class="dish-hero">${escapeHtml(dish.emoji||'🍳')}</div><div class="dish-body"><div class="dish-name">${escapeHtml(dish.dish||'未命名菜品')}</div><span class="dish-role">${escapeHtml(dish.role||'推荐菜')}</span><p class="dish-reason">${escapeHtml(dish.priority_reason||'暂无推荐说明')}</p><div class="dish-price">¥${escapeHtml(dish.package_price??'-')} ${dish.original_price?`<del>¥${escapeHtml(dish.original_price)}</del>`:''}</div></div></div>`).join(''):'<div class="detail-box">暂无保存的菜品明细。</div>';
  const taskHtml=tasks.length?tasks.map((task,index)=>`<div class="task"><span class="task-number">${index+1}</span><div><b>${escapeHtml(task.task||'执行任务')}</b><span>完成时限：${escapeHtml(task.deadline||'按门店节奏执行')}</span></div></div>`).join(''):'<p style="font-size:12px;color:var(--muted)">暂无员工执行指令。</p>';
  const rawOutput=plan.raw_output||'未保存生成文本，以下为结构化菜谱方案。';
  document.getElementById('content').innerHTML=`<section class="plan-head"><div class="plan-context"><div><div class="eyebrow">${escapeHtml(plan.plan_date)} · ${escapeHtml(store.store_id||'未标注门店')}</div><h3>${escapeHtml(result.scenario_tag||'历史推荐方案')}</h3><p>${escapeHtml(store.store_name||'当前门店')} · 保存于 ${formatDateTime(plan.created_at)} · <span class="decision ${decisionClass(plan.decision)}">${decisionLabel(plan.decision)}</span></p></div><div class="plan-tools"><button class="open-btn secondary" onclick="openPlanPage('/dmall-member')">会员 App 方案</button><button class="open-btn" onclick="openPlanPage('/store-dashboard')">门店执行大屏</button></div></div></section><div class="content-body"><section><div class="section-title"><h4>推荐菜谱与套餐</h4><span>${menus.length} 道菜</span></div><div class="menu-grid">${menuHtml}</div></section><section class="detail-grid"><div class="detail-box"><h4>连带推荐</h4><p>${escapeHtml(result.cross_sell||'暂无连带推荐')}</p></div><div class="detail-box"><h4>价值预估</h4><div class="metrics"><div class="metric"><b>${escapeHtml(estimate.loss_reduction||'-')}</b><span>预计减损</span></div><div class="metric"><b>${escapeHtml(estimate.ticket_lift||'-')}</b><span>客单价提升</span></div><div class="metric"><b>${escapeHtml(estimate.cross_sell_rate||'-')}</b><span>连带率</span></div><div class="metric"><b>${escapeHtml(estimate.member_open_rate||'-')}</b><span>会员打开率</span></div></div></div></section><section class="tasks"><div class="section-title"><h4>员工执行指令</h4><span>${tasks.length} 项</span></div><div class="task-list">${taskHtml}</div></section><details class="raw-details"><summary>查看保存的生成说明</summary><pre>${escapeHtml(rawOutput)}</pre></details></div>`;
}

async function selectPlan(planId){
  activePlanId=planId;renderHistoryList();setNotice('正在加载所选日期方案...');
  try{const response=await fetch(`/api/recommendations/${encodeURIComponent(planId)}`);if(!response.ok)throw new Error('方案不存在或已被清理');const plan=await response.json();renderPlan(plan);setNotice('');}
  catch(error){renderEmpty('无法读取该方案',error.message);setNotice(error.message,'error');}
}

function openPlanPage(path){if(activePlanId)location.href=`${path}?plan_id=${encodeURIComponent(activePlanId)}`;}
async function loadHistory(){
  try{const response=await fetch('/api/recommendations/history');if(!response.ok)throw new Error('历史方案加载失败');const payload=await response.json();historyItems=payload.recommendations||[];renderHistoryList();if(historyItems.length){await selectPlan(historyItems[0].plan_id);}else{renderEmpty('暂无保存的推荐方案','在运营驾驶舱完成生成后，方案会按门店和业务日期自动保存到这里。');}}
  catch(error){renderEmpty('历史方案加载失败',error.message);setNotice(error.message,'error');}
}
async function clearHistory(){
  if(!historyItems.length){setNotice('当前没有可清空的保存方案。');return;}
  if(!confirm(`确定清空全部 ${historyItems.length} 个保存的推荐方案吗？\n\n此操作不会删除 Memory 历史样例，但无法恢复已清空的方案。`))return;
  const button=document.getElementById('clearButton');button.disabled=true;setNotice('正在清空保存方案...');
  try{const response=await fetch('/api/recommendations/history',{method:'DELETE'});if(!response.ok)throw new Error('清空保存方案失败');const payload=await response.json();historyItems=[];activePlanId=null;renderHistoryList();renderEmpty('历史推荐方案已清空','后续生成的方案仍会按门店和业务日期自动保存。');setNotice(payload.message,'success');}
  catch(error){setNotice(error.message,'error');}
  finally{button.disabled=false;}
}
loadHistory();
</script>
</body>
</html>
