function estimateNumber(value){
  if(typeof value==='number'&&Number.isFinite(value)) return value;
  const match=String(value??'').replace(/,/g,'').match(/-?\d+(?:\.\d+)?/);
  return match?Number(match[0]):null;
}

function normalizeEstimateMetric(raw,defaultUnit){
  const structured=raw&&typeof raw==='object'&&!Array.isArray(raw);
  const legacyLabel=structured?'':String(raw??'').trim();
  const scalarLegacy=/^[+¥]?\s*[\d,.]+\s*(?:%|元|件\/单)?$/.test(legacyLabel);
  const value=estimateNumber(structured?raw.value:(scalarLegacy?raw:null));
  return {
    value,
    baseline:estimateNumber(structured?raw.baseline:null),
    unit:String(structured?(raw.unit||defaultUnit):defaultUnit),
    reason:String(structured?(raw.reason||''):(Number.isFinite(value)?'':legacyLabel)).trim(),
    legacyLabel,
  };
}

function formatEstimateValue(metric,key){
  if(!Number.isFinite(metric.value)) return metric.legacyLabel||'待测算';
  const value=metric.value.toLocaleString('zh-CN',{maximumFractionDigits:1});
  if(metric.unit==='元'||metric.unit==='CNY') return `¥${value}`;
  if(metric.unit==='%') return `${key==='ticket_lift'&&metric.value>0?'+':''}${value}%`;
  return `${value}${metric.unit}`;
}

function estimateReason(metric){
  return metric.reason||'历史方案未保存结构化测算依据。';
}

function chartPoints(values,maxValue,width=252,height=82,padding=8){
  const usableWidth=width-padding*2;
  const usableHeight=height-padding*2;
  return values.map((value,index)=>({
    x:padding+(values.length===1?usableWidth/2:index*usableWidth/(values.length-1)),
    y:padding+usableHeight-(Math.max(0,value)/Math.max(maxValue,1))*usableHeight,
  }));
}

function renderLossTrend(metric){
  const hasBaseline=Number.isFinite(metric.baseline)&&metric.baseline>0;
  const withoutPlanTotal=Math.max(hasBaseline?metric.baseline:metric.value*2,metric.value,1);
  const withPlanTotal=Math.max(0,withoutPlanTotal-metric.value);
  const dayWeights=[0.12,0.29,0.51,0.75,1];
  const withoutPlan=dayWeights.map(weight=>withoutPlanTotal*weight);
  const withPlan=dayWeights.map(weight=>withPlanTotal*weight);
  const withoutPoints=chartPoints(withoutPlan,withoutPlanTotal);
  const withPoints=chartPoints(withPlan,withoutPlanTotal);
  const polyline=points=>points.map(point=>`${point.x.toFixed(1)},${point.y.toFixed(1)}`).join(' ');
  const dots=(points,className)=>points.map(point=>`<circle class="loss-point ${className}" cx="${point.x.toFixed(1)}" cy="${point.y.toFixed(1)}" r="3"></circle>`).join('');
  const labels=['今天','第2天','第3天','第4天','第5天'];
  const dayLabels=withoutPoints.map((point,index)=>`<text class="loss-axis-label" x="${point.x.toFixed(1)}" y="101" text-anchor="middle">${labels[index]}</text>`).join('');
  const ariaLabel=`未来5天累计损耗成本，不采用方案约${withoutPlanTotal.toFixed(1)}元，采用方案约${withPlanTotal.toFixed(1)}元`;
  return `<div class="forecast-chart trend-chart"><div class="loss-line-chart" role="img" aria-label="${escapeHtml(ariaLabel)}"><svg viewBox="0 0 252 108" aria-hidden="true"><line class="chart-grid-line" x1="8" y1="8" x2="244" y2="8"></line><line class="chart-grid-line" x1="8" y1="41" x2="244" y2="41"></line><line class="chart-axis-line" x1="8" y1="74" x2="244" y2="74"></line><polyline class="loss-line without-plan" points="${polyline(withoutPoints)}"></polyline><polyline class="loss-line with-plan" points="${polyline(withPoints)}"></polyline>${dots(withoutPoints,'without-plan')}${dots(withPoints,'with-plan')}${dayLabels}</svg><div class="chart-legend"><span><i></i>未采用方案 ¥${Math.round(withoutPlanTotal).toLocaleString('zh-CN')}</span><span class="with-plan"><i></i>采用方案 ¥${Math.round(withPlanTotal).toLocaleString('zh-CN')}</span></div></div></div><div class="forecast-context">未来 5 天累计损耗成本预测</div>`;
}

function renderTicketColumns(metric){
  const baselineIndex=100;
  const planIndex=baselineIndex+Math.max(0,metric.value);
  const axisMax=Math.ceil(planIndex/10)*10;
  const baselineHeight=baselineIndex/axisMax*100;
  const planHeight=planIndex/axisMax*100;
  return `<div class="forecast-chart trend-chart"><div class="ticket-column-chart" role="img" aria-label="客单价指数由常规方案的 ${baselineIndex} 提升至 ${planIndex}"><div class="ticket-y-axis"><span>${axisMax}</span><span>${Math.round(axisMax/2)}</span><span>0</span></div><div class="ticket-bars"><div class="ticket-bar-group" style="--bar-height:${baselineHeight}%"><b class="ticket-bar-value">${baselineIndex}</b><i class="ticket-bar"></i></div><div class="ticket-bar-group with-plan" style="--bar-height:${planHeight}%"><b class="ticket-bar-value">${planIndex}</b><i class="ticket-bar with-plan"></i></div></div><div class="ticket-labels"><span>常规</span><span class="with-plan">采用方案</span></div></div></div><div class="forecast-context">客单价指数对比（常规 = 100）</div>`;
}

function renderEstimateChart(key,metric){
  if(!Number.isFinite(metric.value)){
    return '<div class="forecast-chart"><div class="forecast-empty">暂无可图表化数值</div></div><div class="forecast-context">等待结构化测算</div>';
  }

  if(key==='loss_reduction') return renderLossTrend(metric);
  if(key==='ticket_lift') return renderTicketColumns(metric);

  if(key==='member_open_rate'){
    const progress=Math.min(100,Math.max(0,metric.value));
    const baseline=Number.isFinite(metric.baseline)?`当前参考 ${metric.baseline}%`:'预计打开率';
    return `<div class="forecast-chart"><div class="metric-donut" style="--progress:${progress}%" role="img" aria-label="预计会员打开率 ${escapeHtml(formatEstimateValue(metric,key))}"><span>${escapeHtml(formatEstimateValue(metric,key))}</span></div></div><div class="forecast-context">${escapeHtml(baseline)}</div>`;
  }

  if(key==='cross_sell_rate'){
    const baseline=Number.isFinite(metric.baseline)?metric.baseline:0;
    const scale=Math.max(metric.value,baseline,1);
    const currentWidth=Math.min(100,Math.max(0,baseline/scale*100));
    const targetWidth=Math.min(100,Math.max(0,metric.value/scale*100));
    return `<div class="forecast-chart"><div class="compare-bars" role="img" aria-label="连带率由 ${baseline} 提升至 ${escapeHtml(formatEstimateValue(metric,key))}"><div class="compare-row"><span>当前</span><div class="compare-track"><i class="compare-fill" style="width:${currentWidth}%"></i></div><b>${baseline}</b></div><div class="compare-row target"><span>预测</span><div class="compare-track"><i class="compare-fill" style="width:${targetWidth}%"></i></div><b>${metric.value}</b></div></div></div><div class="forecast-context">单位：${escapeHtml(metric.unit)}</div>`;
  }

  return '<div class="forecast-chart"><div class="forecast-empty">暂无对应图表</div></div>';
}

function renderValue(r){
  const ve=r.value_estimate||{};
  const metrics=[
    {key:'loss_reduction',label:'预计减损',icon:'♻️',unit:'元',className:'loss'},
    {key:'ticket_lift',label:'客单价提升',icon:'💰',unit:'%',className:'ticket'},
    {key:'cross_sell_rate',label:'连带率',icon:'🛒',unit:'件/单',className:'cross'},
    {key:'member_open_rate',label:'会员打开率',icon:'📱',unit:'%',className:'member'},
  ];
  document.getElementById('valueCard').style.display='block';
  document.getElementById('valueCard').classList.add('fade-up');
  document.getElementById('valueGrid').innerHTML=metrics.map(config=>{
    const metric=normalizeEstimateMetric(ve[config.key],config.unit);
    return `<section class="forecast-card ${config.className}"><div class="forecast-head"><div class="forecast-label">${config.icon} ${config.label}</div><div class="forecast-value">${escapeHtml(formatEstimateValue(metric,config.key))}</div></div>${renderEstimateChart(config.key,metric)}<p class="forecast-reason">${escapeHtml(estimateReason(metric))}</p></section>`;
  }).join('');
}

  // 使用 qrcodejs 生成二维码
  if(url){
    const container=document.getElementById('qrContainer');
    if(container){
      container.innerHTML=''; // 清空旧内容
      new QRCode(container,{
        text:url,
        width:140,
        height:140,
        colorDark:"#000000",
        colorLight:"#ffffff",
        correctLevel:QRCode.CorrectLevel.M
      });
    }
  }

  overlay.classList.add('show');
  document.body.style.overflow='hidden';
  if(!wasOpen) document.querySelector('#recipeModalInner .modal-close')?.focus();
}

function setRecipeImageButtonState(idx,isLoading){
  document.querySelectorAll(`.recipe-image-btn[data-menu-index="${idx}"]`).forEach(button=>{
    button.disabled=isLoading;
    button.classList.toggle('is-loading',isLoading);
    const hasImage=Boolean(safeAssetUrl(currentResult?.menus?.[idx]?.recipe_image_url));
    button.textContent=isLoading
      ?'正在生成...'
      :button.classList.contains('recipe-image-primary')
        ?hasImage?'🎨 重新生成所选图片':'🎨 生成所选菜谱图片'
        :hasImage?'重新生成图片':'生成菜谱图片';
  });
}

function updateRecipeImageToolbar(){
  const select=document.getElementById('recipeImageSelect');
  const button=document.getElementById('recipeImageToolbarBtn');
  if(!select||!button) return;
  const idx=Number(select.value);
  button.dataset.menuIndex=String(idx);
  const hasImage=Boolean(safeAssetUrl(currentResult?.menus?.[idx]?.recipe_image_url));
  button.textContent=hasImage?'🎨 重新生成所选图片':'🎨 生成所选菜谱图片';
}

function generateSelectedRecipeImage(button,event){
  const idx=Number(document.getElementById('recipeImageSelect')?.value);
  if(!Number.isInteger(idx)) return;
  return generateRecipeImage(idx,button,event);
}

async function generateRecipeImage(idx,button,event){
  event?.preventDefault();
  event?.stopPropagation();
  if(recipeImageGenerating.has(idx)) return;
  if(!currentPlanId){
    showToast('当前方案尚未保存，请先生成完整方案。','info');
    return;
  }
  const dish=currentResult?.menus?.[idx]?.dish;
  if(!dish){
    showToast('未找到指定菜品。','error');
    return;
  }

  const requestedPlanId=currentPlanId;
  recipeImageGenerating.add(idx);
  setRecipeImageButtonState(idx,true);
  document.getElementById('engineStatus').textContent=`正在生成「${dish}」菜谱图片...`;

  try{
    const response=await fetch(`/api/recommendations/${encodeURIComponent(requestedPlanId)}/menus/${idx}/image`,{
      method:'POST',
      headers:{'Accept':'application/json'}
    });
    const payload=await response.json().catch(()=>({}));
    if(!response.ok) throw new Error(payload.detail||`图片生成失败（HTTP ${response.status}）`);

    if(currentPlanId===requestedPlanId){
      currentResult=payload.result;
      recipeUrls=payload.recipe_urls||recipeUrls;
      renderResult({plan_id:currentPlanId,result:currentResult});
      if(document.getElementById('recipeModal').classList.contains('show')){
        openRecipe(idx);
      }
      document.getElementById('engineStatus').textContent=`✅ 「${dish}」菜谱图片已生成`;
      showToast(`「${dish}」菜谱图片已生成，可在「菜谱图片」页查看下载`,'success');
    }
  }catch(error){
    console.error('generateRecipeImage error:',error);
    document.getElementById('engineStatus').textContent=`❌ 「${dish}」图片生成失败`;
    showToast(error.message||'菜谱图片生成失败，请稍后重试。','error');
  }finally{
    recipeImageGenerating.delete(idx);
    setRecipeImageButtonState(idx,false);
  }
}

function closeRecipe(){
  document.getElementById('recipeModal').classList.remove('show');
  document.body.style.overflow='';
  if(recipeModalLastFocus&&document.contains(recipeModalLastFocus)&&typeof recipeModalLastFocus.focus==='function'){
    recipeModalLastFocus.focus();
  }
  recipeModalLastFocus=null;
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeRecipe();});

init();
</script>
</body>
</html>
