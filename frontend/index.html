<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e2a3a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
<title>AI生鲜助手</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--panel:#fff;--ink:#1a2332;--ink2:#5a6577;--ink3:#8a95a8;
  --line:#e6eaf0;--line2:#eef2f7;
  --brand:#0ea5a4;--brand-d:#0d8b8a;--brand-l:#e6f7f6;
  --warm:#f97316;--warm-l:#fff3ea;
  --red:#ef4444;--red-l:#fdeaea;
  --green:#22c55e;--green-l:#e8f8ee;
  --amber:#f59e0b;--amber-l:#fef5e7;
  --blue:#3b82f6;--blue-l:#eaf2fe;
  --purple:#8b5cf6;--purple-l:#f1ecfe;
  --shadow:0 1px 3px rgba(20,40,80,.06),0 4px 16px rgba(20,40,80,.05);
  --shadow-lg:0 8px 32px rgba(20,40,80,.1);
  --radius:14px;
}
body{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
:focus-visible{outline:2px solid var(--brand);outline-offset:2px}
.topbar :focus-visible{outline-color:#7dd8d6}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#cdd6e4;border-radius:8px}

/* ===== 顶栏 ===== */
.topbar{background:linear-gradient(110deg,#0e2a3a 0%,#134e4a 55%,#0d8b8a 100%);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:20px;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:12px}
.brand-logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#f97316,#fb923c);display:flex;align-items:center;justify-content:center;font-size:22px}
.brand h1{font-size:17px;font-weight:700}
.brand p{font-size:11.5px;color:#a7d4d3}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.status-chip{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);padding:7px 14px;border-radius:10px;font-size:12px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.status-dot.mock{background:var(--amber)}
.status-dot.offline{background:var(--red)}
.history-btn{padding:9px 12px;border:1px solid rgba(255,255,255,.28);border-radius:8px;color:#fff;background:rgba(255,255,255,.08);font-size:12.5px;font-weight:600;transition:.2s}
.history-btn:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.5)}
.gen-btn{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;padding:10px 22px;border-radius:11px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(249,115,22,.45);transition:.2s}
.gen-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(249,115,22,.55)}
.gen-btn:disabled{opacity:.5;cursor:not-allowed}

/* ===== 布局 ===== */
.app{max-width:1640px;margin:0 auto;padding:18px 20px 40px}
.grid{display:grid;grid-template-columns:300px minmax(0,1fr) 340px;gap:16px;align-items:start}
.col{display:flex;flex-direction:column;gap:16px;min-width:0}
.side-col{transform:translateY(var(--side-rail-offset,0));will-change:transform}
.side-col #dataVizBody{grid-template-columns:1fr}
/* Memory 和价值预估限高，不拉到页面最底部 */
#memoryCard .card-body{max-height:calc(100vh - 250px);overflow-y:auto}
.value-card .value-grid{max-height:calc(100vh - 250px);overflow-y:auto}

/* ===== 卡片 ===== */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:14px 16px 10px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--line2)}
.card-head .h-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px}
.card-head h3{font-size:14px;font-weight:700}
.card-head .sub{font-size:11px;color:var(--ink3);margin-left:auto}
.card-body{padding:14px 16px}

/* ===== 数据选择 ===== */
.data-select{display:flex;flex-direction:column;gap:8px}
.data-file-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--line2);border-radius:10px;font-size:12.5px;transition:.2s;border:2px solid transparent}
.data-file-btn:hover{background:var(--brand-l)}
.data-file-btn.active{background:var(--brand-l);border-color:var(--brand);font-weight:600}
.data-file-btn .f-icon{font-size:16px}
.data-file-btn .f-name{flex:1}
.data-file-btn .f-type{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--brand);color:#fff}
.data-file-btn.is-loading{pointer-events:none}
.data-file-btn.is-loading .f-type{display:none}
.data-file-btn.is-loading::after{content:'';width:13px;height:13px;border:2px solid rgba(13,139,138,.25);border-top-color:var(--brand-d);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* ===== 数据可视化（宽列双栏布局） ===== */
#dataVizBody{display:grid;grid-template-columns:1fr 1fr;gap:0 20px}
#dataVizBody .data-section{padding:10px 0;border-bottom:1px dashed var(--line2)}
#dataVizBody .data-section:last-child{border-bottom:none}
#dataVizBody .data-section.full-row{grid-column:1/-1}
.data-label{font-size:13px;color:var(--ink2);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.data-label .tag{font-size:11px;padding:2px 7px;border-radius:5px;font-weight:600}
.tag-danger{background:var(--red-l);color:#dc2626}
.tag-warn{background:var(--amber-l);color:#b45309}
.tag-ok{background:var(--green-l);color:#16a34a}
.tag-info{background:var(--blue-l);color:#2563eb}
.inv-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:4px 0}
.inv-row .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.inv-row .nm{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inv-row .meta{font-size:12px;color:var(--ink3);flex-shrink:0}
.inv-bar{height:4px;background:var(--line2);border-radius:3px;margin-top:2px;overflow:hidden}
.inv-bar i{display:block;height:100%;border-radius:3px}
.inventory-pager{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px;padding-top:6px;border-top:1px dashed var(--line2)}
.inventory-pager button{width:26px;height:24px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--brand-d);font-size:16px;line-height:1}
.inventory-pager button:hover:not(:disabled){background:var(--brand-l);border-color:var(--brand)}
.inventory-pager button:disabled{color:var(--ink3);cursor:not-allowed}
.inventory-pager span{font-size:11px;color:var(--ink3);font-variant-numeric:tabular-nums}
.community-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.community-stat{background:var(--line2);border-radius:8px;padding:8px 9px}
.community-stat .v{font-size:16px;font-weight:700;color:var(--brand-d)}
.community-stat .l{font-size:11px;color:var(--ink3);margin-top:1px}

/* ===== AI 推理区 ===== */
.engine-card{min-height:300px;scroll-margin-top:88px}
.engine-idle{text-align:center;padding:40px 20px;color:var(--ink3)}
.engine-idle .big{font-size:50px;margin-bottom:12px;opacity:.4}
.engine-idle p{font-size:13px}
.engine-idle .hint{font-size:11.5px;margin-top:8px}
.agent-trace{position:relative;isolation:isolate;margin:12px 0 0;border:1px solid #c7d2fe;border-radius:16px;background:#f8faff;overflow:hidden;box-shadow:0 8px 28px rgba(79,70,229,.08)}
.agent-trace::before{content:'';position:absolute;z-index:-1;width:260px;height:260px;right:-100px;top:-160px;border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,.15),transparent 70%);pointer-events:none}
.agent-trace-head{display:flex;align-items:center;gap:10px;width:100%;padding:12px 14px;background:linear-gradient(110deg,rgba(238,242,255,.98),rgba(240,253,250,.92));cursor:pointer;user-select:none;text-align:left}
.agent-trace-head .head-icon{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#14b8a6);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 5px 12px rgba(99,102,241,.22);font-size:14px}
.agent-trace-head .head-copy{min-width:0}
.agent-trace-head h4{display:flex;align-items:center;gap:7px;font-size:12.5px;color:#3730a3;font-weight:800}
.agent-trace-head .head-sub{font-size:10px;color:#7c83a4;margin-top:1px}
.agent-trace-live{display:inline-flex;align-items:center;gap:4px;font-size:9px;color:#0f766e;background:rgba(204,251,241,.82);padding:1px 6px;border-radius:999px;font-weight:700}
.agent-trace-live b{font-weight:800}
.agent-trace-live i{width:5px;height:5px;border-radius:50%;background:#14b8a6;box-shadow:0 0 0 4px rgba(20,184,166,.12);animation:tracePulse 1.4s ease-in-out infinite}
.agent-trace[data-state="completed"] .agent-trace-live i{background:#22c55e;animation:none}
.agent-trace[data-state="failed"] .agent-trace-live{color:#b91c1c;background:#fee2e2}
.agent-trace[data-state="failed"] .agent-trace-live i{background:#ef4444;animation:none;box-shadow:none}
.agent-trace-head .badge{margin-left:auto;flex-shrink:0;font-size:10px;padding:3px 9px;border-radius:999px;background:#e0e7ff;color:#4338ca;font-weight:800;border:1px solid rgba(99,102,241,.14)}
.agent-trace-head .badge.running{background:#fff7ed;color:#c2410c;border-color:#fed7aa}
.agent-trace-head .badge.completed{background:#dcfce7;color:#15803d;border-color:#bbf7d0}
.agent-trace-head .badge.failed{background:#fee2e2;color:#b91c1c;border-color:#fecaca}
.agent-trace-head .arrow{font-size:11px;color:#6366f1;transition:.2s}
.agent-trace.collapsed .arrow{transform:rotate(-90deg)}
.agent-trace.collapsed .agent-flow-wrap{display:none}
.agent-trace-progress{height:4px;background:rgba(224,231,255,.75);overflow:hidden}
.agent-trace-progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,#6366f1,#06b6d4,#22c55e);background-size:200% 100%;transition:width .45s ease;animation:progressGlow 1.8s linear infinite}
.agent-trace-progress.failed i{background:linear-gradient(90deg,#6366f1,#ef4444)}
/* 动态流程图：横向阶段、流动连线、自动并行分组 */
.agent-flow-wrap{position:relative;overflow:hidden;background-color:#f8faff;background-image:linear-gradient(rgba(99,102,241,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.055) 1px,transparent 1px);background-size:22px 22px}
.agent-flow-wrap::before,.agent-flow-wrap::after{content:'';position:absolute;z-index:3;top:0;bottom:0;width:28px;pointer-events:none}
.agent-flow-wrap::before{left:0;background:linear-gradient(90deg,#f8faff,transparent)}
.agent-flow-wrap::after{right:0;background:linear-gradient(-90deg,#f8faff,transparent)}
.agent-flow{position:relative;display:flex;align-items:center;min-height:182px;padding:24px 22px;overflow-x:auto;scroll-behavior:smooth}
.agent-flow.has-feedback-loop{padding-bottom:82px}
.agent-flow::-webkit-scrollbar{height:6px}
.feedback-loop{position:absolute;left:0;top:0;z-index:0;overflow:visible;pointer-events:none}
.feedback-loop>path{fill:none;stroke:#0d9488;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
.feedback-loop .feedback-branch{stroke-dasharray:4 5;opacity:.88}
.feedback-loop-label{position:absolute;z-index:2;display:flex;align-items:center;gap:5px;padding:4px 9px;border:1px solid #99f6e4;border-radius:999px;background:rgba(240,253,250,.96);box-shadow:0 4px 12px rgba(13,148,136,.11);color:#0f766e;font-size:9px;font-weight:800;line-height:1.4;white-space:nowrap;pointer-events:none}
.feedback-loop-label i{width:6px;height:6px;border-radius:50%;background:#14b8a6;box-shadow:0 0 0 4px rgba(20,184,166,.12)}
.flow-col{position:relative;z-index:1;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.flow-col.parallel{display:grid;grid-template-columns:repeat(2,178px);gap:10px;border:1.5px dashed #a5b4fc;border-radius:16px;padding:18px 10px 10px;background:rgba(238,242,255,.72);box-shadow:inset 0 0 24px rgba(99,102,241,.04)}
.flow-col.parallel::before{content:'并行 MCP 工具调用';position:absolute;top:-9px;left:14px;background:#eef2ff;border:1px solid #a5b4fc;color:#4f46e5;font-size:9px;font-weight:800;padding:2px 8px;border-radius:999px;line-height:1.5;letter-spacing:.3px}
.flow-col.parallel .flow-node{height:118px;min-height:118px}
.flow-node{position:relative;width:178px;min-height:108px;background:rgba(255,255,255,.96);border:1.5px solid #dbe3ff;border-radius:14px;padding:11px 12px 10px 14px;box-shadow:0 5px 14px rgba(49,46,129,.07);transition:transform .3s ease,border-color .3s ease,box-shadow .3s ease,background .3s ease;animation:flowNodeIn .42s cubic-bezier(.2,.8,.2,1) both;overflow:hidden}
.flow-node::before{content:'';position:absolute;left:0;top:11px;bottom:11px;width:3px;border-radius:0 3px 3px 0;background:#c7d2fe;transition:.3s}
.flow-node::after{content:'';position:absolute;inset:0;transform:translateX(-130%);background:linear-gradient(105deg,transparent 34%,rgba(255,255,255,.74) 48%,transparent 62%);pointer-events:none}
.flow-node .fn-top{display:flex;align-items:center;gap:6px}
.flow-node .fn-state{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:900;background:#eef2ff;color:#4338ca;flex-shrink:0;position:relative;border:1px solid #c7d2fe}
.flow-node .fn-kind{margin-left:auto;font-size:8.5px;padding:2px 7px;border-radius:999px;background:#eef2ff;color:#6366f1;font-weight:800;letter-spacing:.35px}
.flow-node .fn-label{font-size:12px;font-weight:800;color:#312e81;line-height:1.4;margin-top:7px}
.flow-node .fn-detail{font-size:10.5px;color:#64748b;margin-top:4px;line-height:1.48;display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.flow-node .fn-meta{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.flow-node .fn-meta:empty{display:none}
.flow-node .fn-meta span{font-size:9px;color:#64748b;background:#f1f5f9;padding:2px 6px;border-radius:5px;font-family:Consolas,monospace;overflow-wrap:anywhere}
.flow-node.stage{border-color:#bae6fd;background:linear-gradient(145deg,#fff,#f0f9ff)}
.flow-node.stage::before{background:#0ea5e9}
.flow-node.stage .fn-state{background:#e0f2fe;color:#0369a1;border-color:#bae6fd}
.flow-node.stage .fn-kind{background:#e0f2fe;color:#0369a1}
.flow-node.running{transform:translateY(-3px);border-color:#818cf8;background:#fff;box-shadow:0 0 0 4px rgba(99,102,241,.1),0 12px 24px rgba(79,70,229,.16)}
.flow-node.running::before{background:linear-gradient(#6366f1,#06b6d4);box-shadow:0 0 10px rgba(99,102,241,.5)}
.flow-node.running::after{animation:nodeScan 1.8s ease-in-out infinite}
.flow-node.running .fn-state{color:transparent;border-color:#a5b4fc;background:#eef2ff}
.flow-node.running .fn-state::before{content:'';position:absolute;inset:-4px;border:1px solid rgba(99,102,241,.35);border-radius:50%;animation:tracePulse 1.25s ease-out infinite}
.flow-node.running .fn-state::after{content:'';position:absolute;inset:4px;border:2px solid #6366f1;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}
.flow-node.completed{border-color:#86efac;background:linear-gradient(145deg,#fff,#f7fff9)}
.flow-node.completed::before{background:#22c55e}
.flow-node.completed .fn-state{background:#dcfce7;color:#15803d;border-color:#bbf7d0}
.flow-node.completed .fn-kind{background:#f0fdf4;color:#16a34a}
.flow-node.failed{border-color:#fca5a5;background:#fff8f8}
.flow-node.failed::before{background:#ef4444}
.flow-node.failed .fn-state{background:#fee2e2;color:#dc2626;border-color:#fecaca}
.flow-node.failed .fn-label{color:#991b1b}
.flow-node.failed .fn-kind{background:#fef2f2;color:#dc2626}
.flow-link{flex-shrink:0;width:48px;height:26px;position:relative;align-self:center}
.flow-link::before{content:'';position:absolute;left:2px;right:9px;top:50%;height:2px;margin-top:-1px;background:#c7d2fe;transition:.3s}
.flow-link::after{content:'';position:absolute;right:1px;top:50%;transform:translateY(-50%);border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:7px solid #c7d2fe;transition:.3s}
.flow-link .flow-particle{display:none;position:absolute;z-index:2;top:50%;left:0;width:7px;height:7px;margin-top:-3.5px;border-radius:50%;background:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,.13),0 0 10px #6366f1}
.flow-link.flowing::before{background:repeating-linear-gradient(90deg,#6366f1 0 6px,#c7d2fe 6px 12px);background-size:24px 100%;animation:dashFlow .6s linear infinite}
.flow-link.flowing::after{border-left-color:#6366f1}
.flow-link.flowing .flow-particle{display:block;animation:linkParticle 1.15s ease-in-out infinite}
.flow-link.done::before{background:#4ade80}
.flow-link.done::after{border-left-color:#4ade80}
.flow-link.failed::before{background:#fca5a5}
.flow-link.failed::after{border-left-color:#fca5a5}
@keyframes dashFlow{to{background-position:24px 0}}
@keyframes linkParticle{0%{left:0;opacity:0}15%{opacity:1}85%{opacity:1}100%{left:calc(100% - 9px);opacity:0}}
@keyframes nodeScan{0%,30%{transform:translateX(-130%)}70%,100%{transform:translateX(130%)}}
@keyframes tracePulse{0%,100%{transform:scale(.88);opacity:.55}50%{transform:scale(1.18);opacity:1}}
@keyframes progressGlow{to{background-position:-200% 0}}
@keyframes flowNodeIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
.thinking-chain{background:#0f172a;color:#cbd5e1;font-family:"Cascadia Code","Fira Code",Consolas,monospace;font-size:12.5px;line-height:1.7;padding:16px;border-radius:10px;max-height:400px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;margin-top:10px}
.thinking-chain .cursor{display:inline-block;width:8px;height:14px;background:var(--brand);animation:blink 1s steps(1) infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}
.thinking-chain::-webkit-scrollbar-thumb{background:#334155}

/* ===== 菜单结果 ===== */
.menu-out{display:none;margin-top:12px}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.dish-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:.2s;cursor:pointer}
.dish-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--brand)}
.dish-img{height:80px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,var(--brand-l),#f0fdfa)}
.dish-body{padding:10px 12px}
.dish-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.dish-name .role{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600;background:var(--warm-l);color:var(--warm)}
.dish-desc{font-size:11px;color:var(--ink2);margin-top:4px}
.dish-price{margin-top:6px;font-size:13px;font-weight:700;color:var(--red)}
.dish-price .old{font-size:11px;color:var(--ink3);text-decoration:line-through;font-weight:400;margin-left:4px}
.dish-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:9px}
.recipe-image-btn{display:inline-flex;align-items:center;justify-content:center;min-height:32px;padding:7px 11px;border:1px solid rgba(13,139,138,.28);border-radius:8px;background:var(--brand-l);color:var(--brand-d);font-size:11px;font-weight:700;line-height:1.2;transition:.2s}
.recipe-image-btn:hover{border-color:var(--brand);background:#d8f4f2}
.recipe-image-btn:disabled{opacity:.65;cursor:wait;transform:none}
.recipe-image-btn.is-loading::before{content:"";width:12px;height:12px;margin-right:6px;border:2px solid rgba(13,139,138,.25);border-top-color:var(--brand-d);border-radius:50%;animation:spin .8s linear infinite}
.recipe-image-toolbar{display:flex;align-items:flex-end;gap:10px;margin:0 0 12px;padding:12px;border:1px solid rgba(13,139,138,.24);border-radius:11px;background:linear-gradient(135deg,#f0fdfa,var(--brand-l))}
.recipe-image-toolbar .recipe-image-btn{min-height:38px}
.recipe-image-field{display:flex;flex:1;min-width:0;flex-direction:column;gap:5px}
.recipe-image-field span{font-size:11px;font-weight:700;color:var(--brand-d)}
.recipe-image-field select{width:100%;height:38px;padding:0 32px 0 11px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font:inherit;font-size:12px;outline:none}
.recipe-image-field select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(13,139,138,.1)}
.recipe-image-primary{min-height:38px;padding:9px 16px;background:var(--brand);border-color:var(--brand);color:#fff;font-size:12px;box-shadow:0 5px 14px rgba(13,139,138,.2)}
.recipe-image-primary:hover{background:var(--brand-d);color:#fff}

/* ===== 场景包 ===== */
.pkg-main{padding:14px 16px;background:linear-gradient(135deg,var(--brand-l),#f0fdfa)}
.pkg-title{font-size:14px;font-weight:700}
.pkg-items{padding:12px 16px}
.pkg-items .it{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px dotted var(--line2)}
.pkg-items .it:last-child{border-bottom:none}

/* ===== 触达矩阵 ===== */
.reach-nav{display:flex;flex-direction:column;padding:12px;gap:10px}
.reach-link{display:flex;align-items:center;width:100%;gap:11px;padding:12px;background:var(--line2);border:1px solid transparent;border-radius:9px;text-align:left;transition:.2s}
.reach-link:hover{background:#fff;border-color:var(--brand);box-shadow:var(--shadow)}
.reach-link .nav-icon{width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:8px;font-size:17px;flex-shrink:0}
.reach-link .nav-copy{min-width:0;flex:1}
.reach-link .nav-title{display:block;font-size:12.5px;font-weight:700;color:var(--ink)}
.reach-link .nav-sub{display:block;font-size:10.5px;color:var(--ink3);margin-top:2px}
.reach-link .nav-arrow{font-size:18px;color:var(--ink3)}

/* ===== 价值预估 ===== */
.value-card{margin-top:0;overflow-anchor:none}
.value-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;padding:14px}
.value-card .card-head h3{font-size:13px}
.value-collapse-btn{width:28px;height:28px;margin-left:auto;border:1px solid var(--line);border-radius:7px;display:grid;place-items:center;color:var(--ink2);background:var(--panel);flex-shrink:0;transition:background .2s,border-color .2s}
.value-collapse-btn:hover{background:var(--green-l);border-color:#86efac;color:#15803d}
.value-collapse-icon{display:block;font-size:12px;line-height:1;transition:transform .2s}
.value-card.collapsed .value-grid{display:none}
.value-card.collapsed .value-collapse-icon{transform:rotate(-90deg)}
.forecast-card{--chart-color:var(--brand);min-width:0;padding:11px;background:#f8fafc;border:1px solid var(--line2);border-radius:8px;display:flex;flex-direction:column}
.forecast-card.loss{--chart-color:#16a34a}.forecast-card.ticket{--chart-color:#ea580c}.forecast-card.cross{--chart-color:#2563eb}.forecast-card.member{--chart-color:#0d9488}
.forecast-card.loss,.forecast-card.ticket{grid-column:1/-1}
.forecast-head{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;min-height:39px}
.forecast-label{font-size:10.5px;color:var(--ink2);font-weight:600;line-height:1.35}
.forecast-value{font-size:15px;color:var(--chart-color);font-weight:800;line-height:1.2;text-align:right;overflow-wrap:anywhere}
.forecast-chart{height:78px;display:flex;align-items:center;justify-content:center;margin:5px 0 7px}
.forecast-chart.trend-chart{height:136px;display:block;margin-top:8px}
.loss-line-chart{width:100%;height:100%;display:grid;grid-template-rows:minmax(0,1fr) auto;gap:4px}
.loss-line-chart svg{display:block;width:100%;height:104px;overflow:visible}
.chart-grid-line{stroke:#dbe3ec;stroke-width:1;stroke-dasharray:3 4}
.chart-axis-line{stroke:#cbd5e1;stroke-width:1}
.loss-line{fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.loss-line.without-plan{stroke:#94a3b8}.loss-line.with-plan{stroke:#16a34a}
.loss-point{stroke:#fff;stroke-width:2}.loss-point.without-plan{fill:#94a3b8}.loss-point.with-plan{fill:#16a34a}
.loss-axis-label{fill:#94a3b8;font-size:9px;font-family:"PingFang SC","Microsoft YaHei",sans-serif}
.chart-legend{display:flex;align-items:center;justify-content:center;gap:14px;color:var(--ink3);font-size:9px;line-height:1}
.chart-legend span{display:flex;align-items:center;gap:5px}.chart-legend i{display:block;width:15px;height:3px;border-radius:3px;background:#94a3b8}.chart-legend .with-plan i{background:#16a34a}
.ticket-column-chart{width:100%;height:100%;display:grid;grid-template-columns:32px minmax(0,1fr);grid-template-rows:minmax(0,1fr) auto;column-gap:8px}
.ticket-y-axis{grid-row:1;display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;padding:1px 0 4px;color:var(--ink3);font-size:8px}
.ticket-bars{grid-column:2;grid-row:1;position:relative;display:flex;align-items:flex-end;justify-content:center;gap:38px;border-left:1px solid #cbd5e1;border-bottom:1px solid #cbd5e1;background:repeating-linear-gradient(to bottom,transparent 0 31px,#e2e8f0 31px 32px)}
.ticket-bar-group{height:100%;width:54px;display:flex;align-items:flex-end;justify-content:center;position:relative;padding-top:16px}
.ticket-bar{width:32px;min-height:3px;height:var(--bar-height);border-radius:4px 4px 0 0;background:#94a3b8;transition:height .55s ease}.ticket-bar.with-plan{background:#ea580c}
.ticket-bar-value{position:absolute;left:50%;top:calc(100% - var(--bar-height) - 15px);transform:translateX(-50%);font-size:9px;font-weight:800;color:var(--ink2);white-space:nowrap}.ticket-bar-group.with-plan .ticket-bar-value{color:#c2410c}
.ticket-labels{grid-column:2;grid-row:2;display:flex;justify-content:center;gap:38px;padding-top:4px;color:var(--ink3);font-size:9px}.ticket-labels span{width:54px;text-align:center}.ticket-labels .with-plan{color:#c2410c;font-weight:700}
.compare-bars{width:100%;display:flex;flex-direction:column;gap:8px}
.compare-row{display:grid;grid-template-columns:26px minmax(0,1fr) 30px;align-items:center;gap:5px;font-size:9px;color:var(--ink3)}
.compare-row b{font-size:9.5px;color:var(--ink2);text-align:right;font-weight:700}
.compare-track{height:10px;background:#e2e8f0;border-radius:2px;overflow:hidden}
.compare-fill{display:block;height:100%;border-radius:2px;background:#94a3b8}
.compare-row.target .compare-fill{background:var(--chart-color)}
.compare-row.target b{color:var(--chart-color)}
.metric-donut{--progress:0%;width:72px;height:72px;border-radius:50%;position:relative;display:grid;place-items:center;background:conic-gradient(var(--chart-color) var(--progress),#e2e8f0 0)}
.metric-donut::after{content:'';position:absolute;inset:9px;border-radius:50%;background:#f8fafc}
.metric-donut span{position:relative;z-index:1;font-size:12px;font-weight:800;color:var(--chart-color)}
.forecast-context{min-height:14px;text-align:center;color:var(--ink3);font-size:9px;line-height:1.35;margin-top:-3px}
.forecast-reason{border-top:1px dashed var(--line);padding-top:7px;margin-top:auto;font-size:10px;color:var(--ink2);line-height:1.5;overflow-wrap:anywhere}
.forecast-empty{font-size:10px;color:var(--ink3);text-align:center}

/* ===== 菜谱弹窗 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,40,.55);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:18px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-close{position:absolute;top:14px;right:16px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.08);font-size:18px;display:flex;align-items:center;justify-content:center;z-index:5}
.modal-close:hover{background:rgba(0,0,0,.15)}
.rm-hero{padding:28px 24px 20px;text-align:center;background:linear-gradient(135deg,var(--brand-l),#f0fdfa);position:relative}
.rm-hero .rm-emoji{font-size:56px;margin-bottom:8px}
.rm-hero h2{font-size:22px;font-weight:800}
.rm-image-action{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--line2);background:#fff}
.rm-image-action .recipe-image-btn{min-width:132px}
.rm-image-action span{font-size:11px;color:var(--ink3)}
.rm-section{padding:16px 24px;border-bottom:1px solid var(--line2)}
.rm-section h4{font-size:14px;font-weight:700;margin-bottom:10px}
.rm-ingr-table{width:100%;border-collapse:collapse}
.rm-ingr-table tr{border-bottom:1px dotted var(--line2)}
.rm-ingr-table td{padding:8px 0;font-size:13px}
.rm-ingr-table td:nth-child(2){text-align:right;color:var(--brand-d);font-weight:600}
.rm-steps{counter-reset:step;list-style:none}
.rm-steps li{position:relative;padding:8px 0 8px 38px;font-size:13px;border-bottom:1px dotted var(--line2)}
.rm-steps li:last-child{border-bottom:none}
.rm-steps li::before{counter-increment:step;content:counter(step);position:absolute;left:0;top:7px;width:26px;height:26px;border-radius:50%;background:var(--brand-l);color:var(--brand-d);display:flex;align-items:center;justify-content:center;font-weight:700}
.rm-tips{background:var(--warm-l);border-radius:10px;padding:12px 14px;font-size:12.5px;color:#92400e}
.rm-qr{display:flex;align-items:center;gap:16px;padding:18px 24px;background:linear-gradient(135deg,var(--brand-l),#f0fdfa)}
.rm-qr-img{width:156px;height:156px;background:#fff;padding:8px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.rm-qr-img img{display:block!important}
.rm-qr-img canvas{display:none!important}
.rm-qr-img table{display:none!important}
.rm-qr-info h5{font-size:13px;font-weight:700}
.rm-qr-info p{font-size:11.5px;color:var(--ink2);margin-top:4px}
.rm-qr-url{font-size:10px;color:var(--ink3);margin-top:6px;word-break:break-all;font-family:monospace}

/* ===== 思考模式开关 ===== */
.think-toggle{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);padding:7px 14px;border-radius:10px;font-size:12px;color:#bfe3e1;transition:.2s;border:1px solid transparent}
.think-toggle:hover{background:rgba(255,255,255,.12)}
.think-toggle:disabled{opacity:.65;cursor:not-allowed}
.think-toggle.active{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.4);color:#c7d2fe}
.think-toggle .think-icon{font-size:14px}

/* ===== 双面板思维链（浅色主题） ===== */
.dual-panel{display:flex;flex-direction:column;gap:12px;margin:10px auto 0;min-width:0;width:100%;max-width:900px}
.panel-thinking,.panel-output{min-width:0;max-width:100%}
.panel-thinking{background:#f4f5f7;border:1px solid #d8dbe2;border-radius:12px;overflow:hidden}
.panel-thinking-head{padding:10px 14px;background:#e8eaf0;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.panel-thinking-head h4{font-size:12.5px;color:#5b3eff;font-weight:700}
.panel-thinking-head .badge{font-size:10px;padding:2px 8px;border-radius:5px;background:#edeaff;color:#5b3eff;font-weight:600;margin-left:auto}
.panel-thinking-head .arrow{color:#888;transition:.2s;font-size:12px}
.panel-thinking.collapsed .arrow{transform:rotate(-90deg)}
.panel-thinking-body{padding:14px 16px;max-height:350px;overflow:auto;overflow-wrap:anywhere;font-size:13px;line-height:1.7;color:#3a3a4a;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif}
.panel-thinking.collapsed .panel-thinking-body{display:none}
.panel-thinking-body::-webkit-scrollbar-thumb{background:#bbb}
.panel-thinking-body .md-content{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:#2a2a3a}
.panel-thinking-body .md-content h1,.panel-thinking-body .md-content h2,.panel-thinking-body .md-content h3{color:#5b3eff;margin:8px 0 4px}
.panel-thinking-body .md-content p{margin:4px 0}
.panel-thinking-body .md-content ul,.panel-thinking-body .md-content ol{margin:4px 0;padding-left:20px}
.panel-thinking-body .md-content li{margin:2px 0}
.panel-thinking-body .md-content code{background:#e0e0e8;padding:1px 5px;border-radius:4px;font-size:12px;color:#c040a0}
.panel-thinking-body .md-content pre{background:#e8eaf0;border:1px solid #d0d3da;border-radius:8px;padding:10px;max-width:100%;overflow-x:auto;margin:6px 0}
.panel-thinking-body .md-content pre code{background:none;padding:0;color:#3a3a4a}
.panel-thinking-body .md-content strong{color:#1a1a2a}
.panel-thinking-body .md-content blockquote{border-left:3px solid #aaa;padding-left:10px;margin:6px 0;color:#666}
.streaming-content{white-space:pre-wrap;overflow-wrap:anywhere}
.stream-cursor{display:inline-block;width:7px;height:1.1em;margin-left:2px;background:currentColor;vertical-align:-.18em;animation:blink .8s steps(1) infinite}

.panel-output{background:#f4f5f7;border:1px solid #d8dbe2;border-radius:12px;overflow:hidden}
.panel-output-head{padding:10px 14px;background:#e8eaf0;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.panel-output-head h4{font-size:12.5px;color:#0891b2;font-weight:700}
.panel-output-head .badge{font-size:10px;padding:2px 8px;border-radius:5px;background:#d0f0f4;color:#0891b2;font-weight:600;margin-left:auto}
.panel-output-head .arrow{color:#888;transition:.2s;font-size:12px}
.panel-output.collapsed .arrow{transform:rotate(-90deg)}
.panel-output.collapsed .panel-output-body{display:none}
.panel-output-body{padding:14px 16px;max-height:450px;overflow:auto;overflow-wrap:anywhere;font-size:13px;line-height:1.7;color:#2a2a3a}
.panel-output-body::-webkit-scrollbar-thumb{background:#bbb}
.panel-output-body .md-content h1,.panel-output-body .md-content h2,.panel-output-body .md-content h3{color:#1a1a2a;margin:10px 0 6px;font-weight:700}
.panel-output-body .md-content h1{font-size:18px}.panel-output-body .md-content h2{font-size:16px}.panel-output-body .md-content h3{font-size:14px}
.panel-output-body .md-content p{margin:6px 0}
.panel-output-body .md-content ul,.panel-output-body .md-content ol{margin:6px 0;padding-left:22px}
.panel-output-body .md-content li{margin:3px 0}
.panel-output-body .md-content code{background:#e0e0e8;padding:1px 5px;border-radius:4px;font-size:12px;color:#c040a0}
.panel-output-body .md-content pre{background:#e8eaf0;border:1px solid #d0d3da;border-radius:8px;padding:12px;max-width:100%;overflow-x:auto;margin:8px 0}
.panel-output-body .md-content pre code{background:none;padding:0;color:#2a2a3a;font-size:12px}
.panel-output-body .md-content strong{color:#1a1a2a}
.panel-output-body .md-content blockquote{border-left:3px solid #0891b2;padding-left:10px;margin:6px 0;color:#666}
.panel-output-body .md-content table{border-collapse:collapse;width:100%;max-width:100%;table-layout:fixed;margin:8px 0}
.panel-output-body .md-content th,.panel-output-body .md-content td{border:1px solid #d0d3da;padding:5px 8px;text-align:left;font-size:12px}
.panel-output-body .md-content th{background:#e8eaf0;font-weight:600}
.panel-output-body .streaming-content{color:#2a2a3a}

/* ===== 轻提示 ===== */
.toast-stack{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:2000;width:calc(100% - 32px);max-width:440px;pointer-events:none}
.toast{display:flex;align-items:flex-start;gap:8px;max-width:100%;padding:11px 16px;border-radius:11px;background:#16233b;color:#e8eef7;font-size:12.5px;line-height:1.5;box-shadow:0 10px 30px rgba(9,18,35,.35);pointer-events:auto;opacity:1;transform:translateY(0);transition:opacity .3s ease,transform .3s ease;animation:fadeUp .25s ease}
.toast .t-icon{flex-shrink:0}
.toast.success{background:#0c5e50}
.toast.error{background:#7f1d1d}
.toast.hide{opacity:0;transform:translateY(8px)}

/* ===== 响应式 ===== */
@media(max-width:1280px){.grid{grid-template-columns:1fr}.side-col{transform:none!important}.value-grid{grid-template-columns:repeat(2,minmax(0,1fr))}#dataVizBody{grid-template-columns:1fr}}
@media(max-width:860px){
  .topbar{flex-wrap:wrap;padding:12px 14px;gap:10px 12px}
  .brand{min-width:0;flex:1}
  .brand h1{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand p{display:none}
  .brand-logo{width:36px;height:36px;font-size:18px;border-radius:9px;flex-shrink:0}
  .topbar-right{margin-left:0;width:100%;flex-wrap:wrap;gap:8px}
  .status-chip{min-width:0;max-width:100%}
  #statusText{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .think-toggle{padding:7px 11px}
  .history-btn{padding:9px 11px}
  .gen-btn{flex:1;justify-content:center;min-width:150px;padding:10px 14px}
  .engine-card{scroll-margin-top:124px}
}
@media(max-width:700px){
  .topbar{position:static;flex-wrap:wrap;padding:12px 14px;gap:9px}.brand{width:100%}.topbar-right{width:100%;margin-left:0;display:grid;grid-template-columns:auto auto minmax(0,1fr);gap:7px}.status-chip{grid-column:1/-1;justify-content:center;min-width:0}.think-toggle,.history-btn,.gen-btn{justify-content:center;padding:8px 9px;white-space:nowrap}.gen-btn{min-width:0}
  .agent-trace-head{align-items:flex-start;padding:11px 12px}.agent-trace-head .head-icon{width:28px;height:28px}.agent-trace-head .head-sub{display:none}.agent-trace-head .badge{margin-top:3px}.agent-trace-live{display:none}
  .agent-flow{min-height:0;max-height:520px;flex-direction:column;align-items:stretch;padding:22px 14px;overflow-x:hidden;overflow-y:auto}.agent-flow.has-feedback-loop{padding-right:54px;padding-bottom:24px}
  .feedback-loop-label{writing-mode:vertical-rl;padding:8px 4px;white-space:normal}.feedback-loop-label i{flex-shrink:0}
  .flow-col{width:100%}.flow-col.parallel{width:100%;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:18px 9px 9px}.flow-node{width:100%;min-height:0}.flow-col.parallel .flow-node{height:124px;min-height:124px;padding:9px 9px 8px 11px}.flow-col.parallel .fn-label{font-size:11px}.flow-col.parallel .fn-detail{font-size:9.5px}.flow-col.parallel .fn-meta span{font-size:8px;padding:2px 4px}.flow-col.parallel .fn-meta span:not(:first-child){display:none}
  .flow-link{width:24px;height:38px;align-self:center}
  .flow-link::before{left:50%;right:auto;top:2px;bottom:9px;width:2px;height:auto;margin:0 0 0 -1px}
  .flow-link::after{right:auto;left:50%;top:auto;bottom:1px;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:7px solid #c7d2fe;border-bottom:0}
  .flow-link.flowing::before{background:repeating-linear-gradient(180deg,#6366f1 0 6px,#c7d2fe 6px 12px);background-size:100% 24px;animation:dashFlowY .6s linear infinite}
  .flow-link.flowing::after{border-left-color:transparent;border-top-color:#6366f1}
  .flow-link.done::after{border-left-color:transparent;border-top-color:#4ade80}.flow-link.failed::after{border-left-color:transparent;border-top-color:#fca5a5}
  .flow-link .flow-particle{top:0;left:50%;margin:-1px 0 0 -3.5px}.flow-link.flowing .flow-particle{animation-name:linkParticleY}
  .value-grid{grid-template-columns:1fr}
  .rm-image-action{align-items:stretch;flex-direction:column}.rm-image-action .recipe-image-btn{width:100%}
  .recipe-image-toolbar{align-items:stretch;flex-direction:column}.recipe-image-toolbar .recipe-image-btn{width:100%}
  .app{padding:14px 12px 32px}
  .modal-overlay{padding:10px}
  .rm-qr{flex-direction:column;text-align:center}
  .rm-qr-img{margin:0 auto}
}
@media(prefers-reduced-motion:reduce){.agent-trace *{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}html{scroll-behavior:auto}}
@keyframes dashFlowY{to{background-position:0 24px}}
@keyframes linkParticleY{0%{top:0;opacity:0}15%{opacity:1}85%{opacity:1}100%{top:calc(100% - 9px);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease both}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-logo">🍽️</div>
    <div><h1>AI生鲜助手</h1><p>LLM Agentic Workflow · 即时烹饪场景经营平台</p></div>
  </div>
  <div class="topbar-right">

<script>

function escapeHtml(value){
  return String(value??'').replace(/[&<>"']/g,char=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[char]));
}

/* 非阻塞轻提示：替代 alert，用于错误与操作反馈 */
function showToast(message,type='info',duration=3600){
  const stack=document.getElementById('toastStack');
  if(!stack) return;
  const toast=document.createElement('div');
  toast.className=`toast ${type}`;
  const icon=document.createElement('span');
  icon.className='t-icon';
  icon.textContent=type==='success'?'✅':type==='error'?'⚠️':'💡';
  const text=document.createElement('span');
  text.textContent=String(message||'');
  toast.append(icon,text);
  stack.appendChild(toast);
  while(stack.children.length>3) stack.firstElementChild.remove();
  setTimeout(()=>{
    toast.classList.add('hide');
    setTimeout(()=>toast.remove(),350);
  },duration);
}

function escapeRawHtmlForMarkdown(value){
  return String(value??'').replace(/&/g,'&amp;').replace(/</g,'&lt;');
}

const safeMarkdownTags=new Set([
  'A','BLOCKQUOTE','BR','CODE','DEL','EM','H1','H2','H3','H4','H5','H6',
  'HR','LI','OL','P','PRE','STRONG','TABLE','TBODY','TD','TH','THEAD','TR','UL'
]);

function isSafeMarkdownUrl(value){
  try{
    const url=new URL(String(value||''),window.location.href);
    return ['http:','https:','mailto:','tel:'].includes(url.protocol);
  }catch(_error){
    return false;
  }
}

function createSafeMarkdownContent(rawText){
  const wrapper=document.createElement('div');
  wrapper.className='md-content';
  const source=String(rawText??'');
  if(typeof marked==='undefined'){
    wrapper.textContent=source;
    return wrapper;
  }

  try{
    const template=document.createElement('template');
    template.innerHTML=marked.parse(escapeRawHtmlForMarkdown(source));
    Array.from(template.content.querySelectorAll('*')).forEach(element=>{
      if(!safeMarkdownTags.has(element.tagName)){
        element.replaceWith(document.createTextNode(element.textContent||''));
        return;
      }

      Array.from(element.attributes).forEach(attribute=>{
        const name=attribute.name.toLowerCase();
        const allowed=(element.tagName==='A'&&(name==='href'||name==='title'))
          ||(element.tagName==='OL'&&name==='start');
        if(!allowed) element.removeAttribute(attribute.name);
      });

      if(element.tagName==='A'){
        const href=element.getAttribute('href');
        if(!href||!isSafeMarkdownUrl(href)){
          element.removeAttribute('href');
        }else{
          element.setAttribute('rel','noopener noreferrer');
        }
      }
      if(element.tagName==='OL'&&!/^\d+$/.test(element.getAttribute('start')||'')){
        element.removeAttribute('start');
      }
    });
    wrapper.appendChild(template.content);
  }catch(_error){
    wrapper.textContent=source;
  }
  return wrapper;
}

function renderSafeMarkdown(element,rawText){
  element.replaceChildren(createSafeMarkdownContent(rawText));
}

/* ============================================================ 初始化 ============================================================ */
async function init(){
  // 健康检查
  try{
    const r=await fetch('/api/health');
    const h=await r.json();
    const dot=document.getElementById('statusDot');
    const txt=document.getElementById('statusText');
    if(h.mock_mode){
      dot.classList.add('mock');
      txt.textContent=`Mock模式 · ${h.llm_model}`;
    }else{
      txt.textContent=`LLM就绪 · ${h.llm_model}`;
    }
    if(h.memory_count>0){
      txt.textContent+=` · Memory:${h.memory_count}条`;
    }
    if(h.mcp_enabled){
      txt.textContent+=' · MCP数据';
    }
    if(h.memory_count!==undefined){
      document.getElementById('memCountLabel').textContent=h.memory_count+' 条';
    }
  }catch(e){
    document.getElementById('statusText').textContent='后端未连接';
    document.getElementById('statusDot').classList.add('offline');
  }

  // 加载数据文件列表
  await loadDataFiles();
}

/* ============================================================ Memory 管理 ============================================================ */
async function viewMemory(){
  const listEl=document.getElementById('memoryList');
  if(listEl.style.display==='block'){
    listEl.style.display='none';
    return;
  }
  try{
    const r=await fetch('/api/memory/cases');
    const d=await r.json();
    document.getElementById('memCountLabel').textContent=d.total+' 条';
    if(!d.cases||d.cases.length===0){
      listEl.innerHTML='<p style="font-size:12px;color:var(--ink3);text-align:center;padding:12px">Memory为空，点击「重置」可注入种子样例</p>';
    }else{
      listEl.innerHTML=d.cases.map(c=>{
        const inp=c.input_context||{};
        const out=c.output||{};
        const menus=(out.menus||[]).map(m=>m.dish).join('、');
        const weather=inp.weather?.description||'';
        const community=inp.community?.type||'';
        return `<div style="padding:10px;border-bottom:1px solid var(--line2);font-size:11.5px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <b style="color:var(--brand-d)">#${escapeHtml(c.id)} ${escapeHtml(out.scenario_tag||'未标记')}</b>
            <span style="color:var(--ink3);font-size:10px">${escapeHtml(c.timestamp?.slice(0,19)||'')}</span>
          </div>
          <div style="color:var(--ink2)">天气: ${escapeHtml(weather)} | 社区: ${escapeHtml(community)}</div>
          <div style="color:var(--ink2)">菜单: ${escapeHtml(menus)}</div>
          ${c.tags?.length?`<div style="margin-top:3px">${c.tags.map(t=>`<span style="background:var(--brand-l);color:var(--brand-d);padding:1px 6px;border-radius:4px;font-size:10px;margin-right:4px">${escapeHtml(t)}</span>`).join('')}</div>`:''}
        </div>`;
      }).join('');
    }
    listEl.style.display='block';
  }catch(e){
    showToast('加载 Memory 失败：'+e.message,'error');
  }
}

async function resetMemory(){
  if(!confirm('确定要重置Memory吗？\n\n将清空所有历史样例并重新注入2条种子样例。')) return;
  try{
    const r=await fetch('/api/memory/reset',{method:'POST'});
    const d=await r.json();
    document.getElementById('memCountLabel').textContent=d.current_count+' 条';
    document.getElementById('memoryList').style.display='none';
    // 更新顶栏状态
    const stxt=document.getElementById('statusText');
    stxt.textContent=stxt.textContent.replace(/Memory:\d+条/,`Memory:${d.current_count}条`);
    showToast(d.message||'Memory 已重置','success');
  }catch(e){
    showToast('重置失败：'+e.message,'error');
  }
}

async function loadDataFiles(){
  try{
    const r=await fetch('/api/data/files');
    const d=await r.json();
    const body=document.getElementById('dataSelectBody');
    if(!d.files||d.files.length===0){
      body.innerHTML='<p style="font-size:12px;color:var(--ink3)">暂无数据文件，请将JSON/CSV文件放入data/目录</p>';
      return;
    }
    body.innerHTML='<div class="data-select">'+d.files.map(f=>
      `<button class="data-file-btn" data-path="${escapeHtml(f.path)}" onclick="loadData(this.dataset.path,event)"><span class="f-icon">📍</span><span class="f-name">${escapeHtml(f.label||f.filename)}</span></button>`
    ).join('')+'</div>';
  }catch(e){
    console.error('loadDataFiles error:',e);
  }
}

async function loadData(path,evt){
  const btn=evt?.currentTarget;
  if(btn?.classList.contains('is-loading')) return;
  document.querySelectorAll('.data-file-btn').forEach(b=>b.classList.remove('active'));
  btn?.classList.add('active','is-loading');
  try{
    const r=await fetch(`/api/data/${encodeURIComponent(path)}`);
    if(!r.ok) throw new Error(`读取失败 (${r.status})`);
    const d=await r.json();
    currentData=d.data;
    currentDisplayData=d.display;
    inventoryPage=0;
    renderDataViz(d.display);
    document.getElementById('dataFileLabel').textContent=dataLabel(currentData);
    const genBtn=document.getElementById('genBtn');
    genBtn.disabled=false;
    genBtn.title='';

    // 重置引擎区
    resetEngine();
    await restoreRecommendationForDate(currentData);
  }catch(e){
    btn?.classList.remove('active');
    showToast('加载数据失败：'+e.message,'error');
  }finally{
    btn?.classList.remove('is-loading');
  }
}

function dataLabel(data){
  const storeInfo=data?.store_info||{};
  return [storeInfo.store_name,storeInfo.date].filter(Boolean).join(' · ')||'已加载';
}

function showInventoryPage(page){
  const inventory=Array.isArray(currentDisplayData?.inventory)?currentDisplayData.inventory:[];
  const totalPages=Math.max(1,Math.ceil(inventory.length/inventoryPageSize));
  inventoryPage=Math.min(Math.max(page,0),totalPages-1);
  renderDataViz(currentDisplayData||{});
}

function renderDataViz(d){
  currentDisplayData=d;
  document.getElementById('dataVizCard').style.display='block';
  let html='';
  const inventory=Array.isArray(d.inventory)?d.inventory:[];
  const sm=d.summary||{
    expiring_count:inventory.filter(item=>item.status==='临期').length,
    high_stock_count:inventory.filter(item=>item.stock_level==='high').length,
  };
  const operational=d.operational_data||{};
  const sales=d.sales_summary||{};
  const salesWindow=operational.sales_window||{};
  const currency=String(operational.currency||'CNY').toUpperCase();
  const moneyPrefix=currency==='CNY'?'¥':`${currency} `;

  if(operational.source){
    const selected=operational.inventory_selected_count;
    const total=operational.inventory_total_count;
    const selectionText=Number.isFinite(selected)&&Number.isFinite(total)?` · 分析 ${selected}/${total} 个 SKU`:'';
    html+=`<div class="data-section"><div class="data-label"><span>🛰️ 经营数据来源</span><span class="tag tag-info">${escapeHtml(operational.transport||'request')}</span></div><div style="font-size:12px;color:var(--ink2)">${escapeHtml(operational.source)}${escapeHtml(selectionText)}</div></div>`;
    if(operational.warning){
      html+=`<div style="margin:-5px 0 10px;padding:8px 10px;border-radius:8px;background:var(--warm-l);color:#92400e;font-size:11px;line-height:1.5">⚠️ ${escapeHtml(operational.warning)}</div>`;
    }
  }

  if(salesWindow.start_date||sales.record_count!==undefined){
    const windowText=salesWindow.start_date&&salesWindow.end_date
      ?`${salesWindow.start_date} 至 ${salesWindow.end_date}`:'未标注窗口';
    const priceAsOf=operational.price_as_of?` · 价格截至 ${operational.price_as_of}`:'';
    html+=`<div class="data-section"><div class="data-label"><span>📈 销售与价格证据</span><span class="tag tag-info">${escapeHtml(sales.record_count??operational.sales_record_count??0)}条</span></div><div style="font-size:12px;color:var(--ink2)">${escapeHtml(windowText)}${escapeHtml(priceAsOf)}</div><div class="community-stats"><div class="community-stat"><div class="v">${escapeHtml(sales.total_units??0)}</div><div class="l">窗口销量</div></div><div class="community-stat"><div class="v">${escapeHtml(moneyPrefix)}${escapeHtml(sales.total_revenue??0)}</div><div class="l">窗口销售额</div></div></div></div>`;
  }

  // 库存
  const totalPages=Math.max(1,Math.ceil(inventory.length/inventoryPageSize));
  inventoryPage=Math.min(inventoryPage,totalPages-1);
  const pageStart=inventoryPage*inventoryPageSize;
  const displayedInventory=inventory.slice(pageStart,pageStart+inventoryPageSize);
  html+=`<div class="data-section full-row"><div class="data-label"><span>📦 库存与临期预警</span><span class="tag ${sm.expiring_count>0?'tag-danger':'tag-ok'}">${escapeHtml(sm.expiring_count||0)}项临期</span></div>`;
  displayedInventory.forEach(it=>{
    const color=it.status==='临期'?'var(--red)':it.stock_level==='high'?'var(--amber)':'var(--green)';
    const inventoryState=it.status==='临期'?`${it.expiry_days}天临期`:it.stock_level==='high'?'库存偏高':'正常';
    const priceText=it.price!==undefined&&it.price!==null&&it.price!==''?` · 售价 ${moneyPrefix}${it.price}`:'';
    html+=`<div class="inv-row"><span class="dot" style="background:${color}"></span><span class="nm">${escapeHtml(it.name)}</span><span class="meta">${escapeHtml(it.stock)}${escapeHtml(it.unit||'')} · ${escapeHtml(inventoryState)}${escapeHtml(priceText)}</span></div><div class="inv-bar"><i style="width:${it.stock_level==='high'?85:it.status==='临期'?60:40}%;background:${color}"></i></div>`;
  });
  if(inventory.length>inventoryPageSize){
    html+=`<div class="inventory-pager"><button type="button" onclick="showInventoryPage(${inventoryPage-1})" aria-label="上一页库存" ${inventoryPage===0?'disabled':''}>&lsaquo;</button><span>${pageStart+1}-${Math.min(pageStart+inventoryPageSize,inventory.length)} / ${inventory.length}</span><button type="button" onclick="showInventoryPage(${inventoryPage+1})" aria-label="下一页库存" ${inventoryPage===totalPages-1?'disabled':''}>&rsaquo;</button></div>`;
  }
  html+='</div>';

  // 天气
  const w=d.weather||{};
  const temperatureText=w.temperature!==undefined&&w.temperature!==null&&w.temperature!==''?` · ${escapeHtml(w.temperature)}°C`:'';
  html+=`<div class="data-section"><div class="data-label"><span>${escapeHtml(w.icon||'🌤️')} 天气</span></div><div style="font-size:12px;color:var(--ink2)">${escapeHtml(w.description||w.condition||'暂无天气数据')}${temperatureText}</div></div>`;

  // 社区
  const c=d.community||{};
  html+=`<div class="data-section"><div class="data-label"><span>🏘️ 社区画像</span><span class="tag tag-info">${escapeHtml(c.type||'')}</span></div><div class="community-stats"><div class="community-stat"><div class="v">${escapeHtml(c.radius||'3km')}</div><div class="l">覆盖半径</div></div><div class="community-stat"><div class="v">${escapeHtml((c.peak_hour||'').split(' ')[0])}</div><div class="l">客流高峰</div></div></div></div>`;

  // 节日
  const f=d.festival||{};
  if(f.name){
    html+=`<div class="data-section"><div class="data-label"><span>🎉 节日/节气</span><span class="tag tag-warn">${escapeHtml(f.name)}</span></div><div style="font-size:12px;color:var(--ink2)">${escapeHtml(f.description||'')}</div></div>`;
  }

  // 通勤
  const cm=d.commute||{};
  html+=`<div class="data-section"><div class="data-label"><span>🚶 通勤节奏</span></div><div style="font-size:12px;color:var(--ink2)">放学 ${escapeHtml(cm.school_dismissal||'-')} · 下班 ${escapeHtml(cm.office_offwork||'-')}</div></div>`;

  // 客流
  const ft=d.foot_traffic||{};
  html+=`<div class="data-section"><div class="data-label"><span>📊 预计客流</span></div><div style="font-size:15px;font-weight:700;color:var(--brand-d)">${escapeHtml(ft.estimated??'-')}人</div></div>`;

  // 热销
  if(d.historical_hot_dishes&&d.historical_hot_dishes.length){

function recommendationStatus(plan){
  if(plan.decision==='accepted') return '✅ 已接受执行';
  if(plan.decision==='rejected') return '⛔ 已拒绝执行';
  return '⏳ 待负责人确认';
}

function restoreRecommendation(plan){
  currentPlanId=plan.plan_id;
  currentResult=plan.result;
  recipeUrls=plan.recipe_urls||{};
  currentRawThinking=plan.raw_thinking||'';
  if(plan.input_context){
    renderDataViz(plan.input_context);
  }

  document.getElementById('engineIdle').style.display='none';
  resetAgentTrace();
  const savedTrace=plan.input_context?.operational_data?.agent_trace||[];
  renderRestoredWorkflow(plan,savedTrace);
  document.getElementById('dualPanel').style.display='flex';
  document.getElementById('panelThinking').style.display=thinkingEnabled?'':'none';
  document.getElementById('thinkingBadge').textContent=plan.raw_thinking?'历史推理':'无推理记录';
  document.getElementById('outputBadge').textContent='历史方案';
  if(thinkingEnabled){
    renderStaticMarkdown('thinkingBody',currentRawThinking,'暂无保存的推理过程。');
  }
  renderStaticMarkdown(
    'outputBody',
    plan.raw_output,
    `# ${plan.result?.scenario_tag||'历史推荐方案'}\n\n该日期的结构化推荐方案已恢复。`
  );
  document.getElementById('engineStatus').textContent=recommendationStatus(plan);
  document.getElementById('genBtnText').textContent='重新生成';
  renderResult({plan_id:plan.plan_id,result:plan.result});
}

async function restoreRecommendationForDate(data){
  const storeInfo=data?.store_info||{};
  const storeId=String(storeInfo.store_id||storeInfo.store_name||'default-store').trim();
  const planDate=String(storeInfo.date||'').trim();
  if(!planDate) return;

  try{
    const query=new URLSearchParams({store_id:storeId,date:planDate});
    const response=await fetch(`/api/recommendations?${query}`);
    if(response.status===404) return;
    if(!response.ok) throw new Error('读取历史方案失败');
    restoreRecommendation(await response.json());
    showToast(`已自动恢复 ${planDate} 的已保存方案`,'info',2800);
  }catch(error){
    console.error('restoreRecommendationForDate error:',error);
  }
}

function createAgentFlowNode(evt,flow){
  // 与上一列的运行中节点并发出现 → 并行分支，归入同列；否则串行新开一列
  let column=agentFlowColumns[agentFlowColumns.length-1];
  const isParallel=column&&column.ids.some(id=>agentFlowNodes.get(id)?.state==='running');
  if(!isParallel){
    column={ids:[],el:document.createElement('div'),link:null};
    column.el.className='flow-col';
    if(agentFlowColumns.length){
      column.link=document.createElement('div');
      column.link.className='flow-link';
      const particle=document.createElement('i');
      particle.className='flow-particle';
      column.link.appendChild(particle);
      flow.appendChild(column.link);
    }
    flow.appendChild(column.el);
    agentFlowColumns.push(column);
  }

  const el=document.createElement('div');
  el.className=`flow-node${evt.kind==='stage'?' stage':''}`;
  el.setAttribute('role','listitem');
  const top=document.createElement('div');
  top.className='fn-top';
  const stateIcon=document.createElement('span');
  stateIcon.className='fn-state';
  const kindChip=document.createElement('span');
  kindChip.className='fn-kind';
  kindChip.textContent=evt.kind==='tool'?'工具调用':evt.kind==='stage'?'生成阶段':'流程步骤';
  top.append(stateIcon,kindChip);
  const label=document.createElement('div');
  label.className='fn-label';
  const detail=document.createElement('div');
  detail.className='fn-detail';
  const meta=document.createElement('div');
  meta.className='fn-meta';
  el.append(top,label,detail,meta);
  column.el.appendChild(el);
  column.ids.push(evt.id);
  if(column.ids.length>1) column.el.classList.add('parallel');

  const node={id:evt.id,kind:evt.kind||'step',el,stateIcon,label,detail,meta,state:'running',index:agentFlowNodes.size+1};
  stateIcon.textContent=node.index;
  agentFlowNodes.set(evt.id,node);
  return node;
}

function updateAgentFlowLinks(){
  agentFlowColumns.forEach(column=>{
    if(!column.link) return;
    const states=column.ids.map(id=>agentFlowNodes.get(id)?.state);
    column.link.classList.remove('flowing','done','failed');
    if(states.includes('failed')) column.link.classList.add('failed');
    else if(states.includes('running')) column.link.classList.add('flowing');
    else if(states.length&&states.every(state=>state==='completed')) column.link.classList.add('done');
  });
}

function updateAgentTraceSummary(){
  const states=Array.from(agentFlowNodes.values()).map(node=>node.state);
  const completed=states.filter(state=>state==='completed').length;
  const failed=states.filter(state=>state==='failed').length;
  const running=states.filter(state=>state==='running').length;
  const trace=document.getElementById('agentTrace');
  const badge=document.getElementById('agentTraceBadge');
  const summaryState=failed?'failed':running?'running':states.length&&completed===states.length?'completed':'idle';
  trace.dataset.state=summaryState;
  badge.className=`badge ${summaryState==='idle'?'':summaryState}`.trim();
  badge.textContent=failed?`${failed} 步失败`:running?`${completed}/${states.length} · 执行中`:states.length?`${completed} 步完成`:'等待执行';
  document.getElementById('agentTraceLiveText').textContent=failed?'异常':running?'实时':states.length?'完成':'等待';
  const progress=document.getElementById('agentTraceProgress');
  progress.style.width=states.length?`${Math.round((completed+failed)/states.length*100)}%`:'0';
  progress.parentElement.classList.toggle('failed',failed>0);
}

function safeAssetUrl(value){
  const raw=String(value??'').trim();
  if(!raw) return '';
  try{
    const url=new URL(raw,window.location.origin);
    return ['http:','https:'].includes(url.protocol)?url.href:'';
  }catch(_error){
    return '';
  }
}

function focusRunningAgentNode(flow,nodeEl){
  if(agentFlowFocusFrame!==null) cancelAnimationFrame(agentFlowFocusFrame);
  agentFlowFocusFrame=requestAnimationFrame(()=>{
    agentFlowFocusFrame=null;
    if(!nodeEl.classList.contains('running')) return;
    const flowRect=flow.getBoundingClientRect();
    const nodeRect=nodeEl.getBoundingClientRect();
    const isVertical=getComputedStyle(flow).flexDirection==='column';
    if(isVertical){
      const top=flow.scrollTop+(nodeRect.top-flowRect.top)-(flow.clientHeight-nodeRect.height)/2;
      flow.scrollTo({top:Math.max(0,top),behavior:'smooth'});
    }else{
      const left=flow.scrollLeft+(nodeRect.left-flowRect.left)-(flow.clientWidth-nodeRect.width)/2;
      flow.scrollTo({left:Math.max(0,left),behavior:'smooth'});
    }
  });
}

function nodeBoundsInFlow(flow,nodeEl){
  const flowRect=flow.getBoundingClientRect();
  const nodeRect=nodeEl.getBoundingClientRect();
  return {
    left:nodeRect.left-flowRect.left+flow.scrollLeft,
    top:nodeRect.top-flowRect.top+flow.scrollTop,
    width:nodeRect.width,
    height:nodeRect.height,
  };
}

function scheduleFeedbackLoop(){
  if(feedbackLoopFrame!==null) cancelAnimationFrame(feedbackLoopFrame);
  feedbackLoopFrame=requestAnimationFrame(()=>{
    feedbackLoopFrame=null;
    renderFeedbackLoop();
  });
}

function renderFeedbackLoop(){
  const flow=document.getElementById('agentFlow');
  const saveNode=agentFlowNodes.get('workflow-save')?.el;
  const memoryNode=agentFlowNodes.get('workflow-memory')?.el;
  const skillsNode=agentFlowNodes.get('workflow-prompt')?.el;
  if(!saveNode||!memoryNode||!skillsNode){
    flow.classList.remove('has-feedback-loop');
    flow.querySelectorAll('.feedback-loop,.feedback-loop-label').forEach(el=>el.remove());
    return;
  }

  flow.classList.add('has-feedback-loop');

  flow.querySelectorAll('.feedback-loop,.feedback-loop-label').forEach(el=>el.remove());
  const save=nodeBoundsInFlow(flow,saveNode);
  const memory=nodeBoundsInFlow(flow,memoryNode);
  const skills=nodeBoundsInFlow(flow,skillsNode);
  const vertical=getComputedStyle(flow).flexDirection==='column';
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('feedback-loop');
  const markerId='feedback-loop-arrow';
  svg.innerHTML=`<defs><marker id="${markerId}" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#0d9488"></path></marker></defs><path class="feedback-main"></path><path class="feedback-branch"></path>`;
  const main=svg.querySelector('.feedback-main');
  const branch=svg.querySelector('.feedback-branch');
  main.setAttribute('marker-end',`url(#${markerId})`);
  branch.setAttribute('marker-end',`url(#${markerId})`);

  const label=document.createElement('div');
  label.className='feedback-loop-label';
  label.innerHTML='<i></i><span>负责人反馈 · Memory 沉淀 · Skills 优化</span>';

  if(vertical){
    const saveX=save.left+save.width;
    const saveY=save.top+save.height/2;
    const memoryX=memory.left+memory.width;
    const memoryY=memory.top+memory.height/2;
    const skillsX=skills.left+skills.width;
    const skillsY=skills.top+skills.height/2;
    const railX=Math.max(saveX,memoryX,skillsX)+26;
    main.setAttribute('d',`M ${saveX} ${saveY} H ${railX} V ${memoryY} H ${memoryX+5}`);
    branch.setAttribute('d',`M ${railX} ${skillsY} H ${skillsX+5}`);
    label.style.left=`${railX+6}px`;
    label.style.top=`${(memoryY+skillsY)/2-50}px`;
  }else{
    const saveX=save.left+save.width/2;
    const saveY=save.top+save.height;
    const memoryX=memory.left+memory.width/2;
    const memoryY=memory.top+memory.height;
    const skillsX=skills.left+skills.width/2;
    const skillsY=skills.top+skills.height;
    const railY=Math.max(saveY,memoryY,skillsY)+40;
    main.setAttribute('d',`M ${saveX} ${saveY} V ${railY} H ${memoryX} V ${memoryY+5}`);
    branch.setAttribute('d',`M ${skillsX} ${railY} V ${skillsY+5}`);
    label.style.left=`${Math.max(memoryX+18,Math.min(saveX-230,(saveX+skillsX)/2-100))}px`;
    label.style.top=`${railY-15}px`;
  }

  const width=Math.max(flow.scrollWidth,flow.clientWidth);
  const height=Math.max(flow.scrollHeight,flow.clientHeight);
  svg.setAttribute('width',width);
  svg.setAttribute('height',height);
  svg.setAttribute('viewBox',`0 0 ${width} ${height}`);
  flow.prepend(svg);
  flow.append(label);
}

function renderAgentEvent(evt){
  if(!evt||!evt.id) return;
  if(evt.kind!=='stage'&&workflowActiveStageId==='workflow-agent-start'){
    completeWorkflowStage('workflow-agent-start','经营数据 Agent 已启动');
  }
  const flow=document.getElementById('agentFlow');
  document.getElementById('agentTrace').style.display='block';

  const node=agentFlowNodes.get(evt.id)||createAgentFlowNode(evt,flow);
  node.state=evt.state||'running';
  node.el.classList.remove('running','completed','failed');
  node.el.classList.add(node.state);
  node.stateIcon.textContent=node.state==='completed'?'✓':node.state==='failed'?'!':node.index;
  node.label.textContent=String(evt.label||evt.id);
  node.detail.textContent=String(evt.detail||'');
  node.detail.title=String(evt.detail||'');
  node.detail.hidden=!evt.detail;
  node.el.setAttribute('aria-label',`${node.label.textContent}，${node.state==='completed'?'已完成':node.state==='failed'?'失败':'执行中'}`);
  const metaParts=[];
  if(evt.tool_name) metaParts.push(evt.tool_name);
  if(evt.source) metaParts.push(`来源: ${evt.source}`);
  if(Number.isFinite(evt.duration_ms)) metaParts.push(`${evt.duration_ms}ms`);
  node.meta.replaceChildren(...metaParts.map(text=>{
    const chip=document.createElement('span');
    chip.textContent=text;
    return chip;
  }));

  updateAgentFlowLinks();
  updateAgentTraceSummary();
  if(node.state==='running') focusRunningAgentNode(flow,node.el);
  if(['workflow-memory','workflow-prompt','workflow-save'].includes(evt.id)) renderFeedbackLoop();

  if(evt.id==='prices'&&node.state==='running'){
    renderPresentationMcpTools('running');
  }else if(evt.id==='prices'&&node.state==='completed'){
    renderPresentationMcpTools('completed');
  }else if((evt.id==='sales'||evt.id==='prices')&&node.state==='failed'){
    renderPresentationMcpTools('failed');
  }
}

function workflowStageLabel(id,fallback='生成阶段'){
  return agentFlowNodes.get(id)?.label.textContent||fallback;
}

function ensureWorkflowTrigger(){
  if(agentFlowNodes.has('workflow-trigger')) return;
  renderAgentEvent({
    kind:'step',
    id:'workflow-trigger',
    state:'completed',
    label:'工作流触发',
    detail:'触发方式：手动触发 · 自动化条件触发',
  });
}

function startWorkflowStage(id,label,detail){
  ensureWorkflowTrigger();
  if(workflowActiveStageId&&workflowActiveStageId!==id){
    completeWorkflowStage(workflowActiveStageId,'已完成');
  }
  workflowActiveStageId=id;
  renderAgentEvent({kind:'stage',id,state:'running',label,detail});
}

function completeWorkflowStage(id,detail){
  if(!id||!agentFlowNodes.has(id)) return;
  if(workflowActiveStageId===id) workflowActiveStageId=null;
  renderAgentEvent({
    kind:'stage',id,state:'completed',
    label:workflowStageLabel(id),detail:detail||'已完成',
  });
}

function failWorkflowStage(message){
  let id=workflowActiveStageId;
  let node=id?agentFlowNodes.get(id):null;
  if(!node){
    node=Array.from(agentFlowNodes.values()).reverse().find(item=>item.state==='running');
    id=node?.id;
  }
  workflowActiveStageId=null;
  if(id&&node){
    renderAgentEvent({kind:node.kind,id,state:'failed',label:node.label.textContent,detail:message});
  }else{
    renderAgentEvent({kind:'stage',id:'workflow-error',state:'failed',label:'生成流程异常',detail:message});
  }
}

function renderWorkflowStatus(message){
  const text=String(message||'').trim();
  if(!text) return;

  if(text.includes('启动多步经营数据 Agent')){
    startWorkflowStage('workflow-agent-start','启动经营数据 Agent','准备门店经营数据上下文');
  }else if(text.includes('正在检索 Memory')){
    completeWorkflowStage('workflow-agent-start','经营数据准备完成');
    startWorkflowStage('workflow-memory','检索 Memory 历史样例','查找相似成功与失败案例');
  }else if(/^找到\s*\d+\s*条相似历史样例/.test(text)){
    completeWorkflowStage('workflow-memory',text);
  }else if(text.includes('正在组装 Prompt')){
    completeWorkflowStage('workflow-memory','历史样例检索完成');
    startWorkflowStage('workflow-prompt','Skills 与 Prompt 组装','注入 Skills、Few-Shot 与当日经营数据');
  }else if(text.includes('正在调用 LLM')){
    completeWorkflowStage('workflow-prompt','Prompt 组装完成');
    startWorkflowStage('workflow-llm','调用 LLM 生成方案',text.replace(/^正在/,'').replace(/生成中\.\.\.$/,''));
  }else if(text.includes('Mock 模式')){
    completeWorkflowStage('workflow-prompt','Prompt 组装完成');
    startWorkflowStage('workflow-llm','调用 Mock 生成器','未配置 LLM API Key，使用模拟生成');
  }else if(text.includes('正在解析结构化输出')){
    completeWorkflowStage('workflow-llm','模型输出流接收完成');
    startWorkflowStage('workflow-parse','解析结构化输出','校验菜单与经营方案字段');
  }else if(text.includes('正在部署菜谱页面')){
    completeWorkflowStage('workflow-parse','结构化结果解析完成');
    startWorkflowStage('workflow-deploy','部署菜谱页面','生成独立菜谱页面与访问链接');
  }else if(text.includes('方案已生成，等待门店负责人确认')){
    completeWorkflowStage('workflow-deploy','菜谱页面部署完成');
    startWorkflowStage('workflow-save','保存待确认方案','等待门店负责人确认与决策');
  }else if(text.includes('生成完成，待门店负责人决策')){
    completeWorkflowStage('workflow-save','方案已保存，等待负责人决策');
  }else{
    const id=`workflow-status-${++workflowFallbackIndex}`;
    startWorkflowStage(id,'处理生成任务',text);
  }
}

function renderRestoredWorkflow(plan,savedTrace){
  ensureWorkflowTrigger();
  renderAgentEvent({kind:'stage',id:'workflow-agent-start',state:'completed',label:'启动经营数据 Agent',detail:'已恢复经营数据上下文'});
  savedTrace.forEach(renderAgentEvent);
  const stages=[
    ['workflow-memory','检索 Memory 历史样例','历史样例检索已完成'],
    ['workflow-prompt','Skills 与 Prompt 组装','Skills 与 Few-Shot 注入完成'],
    ['workflow-llm','调用 LLM 生成方案','模型生成已完成'],
    ['workflow-parse','解析结构化输出','结果契约校验完成'],
    ['workflow-deploy','部署菜谱页面','菜谱访问链接已生成'],
    ['workflow-save','保存待确认方案',recommendationStatus(plan)],
  ];
  stages.forEach(([id,label,detail])=>renderAgentEvent({kind:'stage',id,state:'completed',label,detail}));
}

let sideRailFrame=null;

function alignSideRails(){
  sideRailFrame=null;
  const sideRails=document.querySelectorAll('.side-col');
  if(!window.matchMedia('(min-width:1281px)').matches){
    sideRails.forEach(rail=>rail.style.removeProperty('--side-rail-offset'));
    return;
  }

  const grid=document.querySelector('.grid');
  const mainColumn=document.querySelector('.main-col');
  if(!grid||!mainColumn) return;
  const gridTop=grid.getBoundingClientRect().top+window.scrollY;
  const mainHeight=mainColumn.offsetHeight;
  const viewportBottom=window.scrollY+window.innerHeight;
  const topbar=document.querySelector('.topbar');
  const app=document.querySelector('.app');
  const appTopPadding=app?parseFloat(getComputedStyle(app).paddingTop)||0:0;
  const viewportContentTop=window.scrollY+(topbar?.getBoundingClientRect().bottom||0)+appTopPadding;

  sideRails.forEach(rail=>{
    const railHeight=rail.offsetHeight;
    const maxOffset=Math.max(0,mainHeight-railHeight);
    const valueCard=rail.querySelector('#valueCard');
    const alignToTop=valueCard?.classList.contains('collapsed');
    const viewportOffset=alignToTop
      ?Math.max(0,viewportContentTop-gridTop)
      :Math.max(0,viewportBottom-gridTop-railHeight);
    rail.style.setProperty('--side-rail-offset',`${Math.round(Math.min(viewportOffset,maxOffset))}px`);
  });
}

function scheduleSideRailAlignment(){
  if(sideRailFrame===null) sideRailFrame=requestAnimationFrame(alignSideRails);
}

/* 将任意大小的 SSE 分片拆成稳定的逐字播放队列，完成后仅解析一次 Markdown。 */
function createStreamRenderer(elId){
  const el=document.getElementById(elId);
  const content=document.createElement('div');
  const textNode=document.createTextNode('');
  const cursor=document.createElement('span');
  const queue=[];
  let frameId=null;
  let finalText=null;
  let finishResolver=null;

  content.className='streaming-content';
  cursor.className='stream-cursor';
  content.append(textNode,cursor);
  el.replaceChildren(content);

  function batchSize(){
    if(queue.length>1200) return 18;
    if(queue.length>500) return 10;
    if(queue.length>160) return 6;
    return 2;
  }

  function finalize(){
    if(finalText===null) return;
    renderSafeMarkdown(el,finalText);
    el.scrollTop=el.scrollHeight;
    const resolve=finishResolver;
    finishResolver=null;
    if(resolve) resolve();
  }

  function play(){
    frameId=null;
    if(!queue.length){
      finalize();
      return;
    }
    const keepPinned=el.scrollHeight-el.scrollTop-el.clientHeight<32;
    textNode.appendData(queue.splice(0,batchSize()).join(''));
    if(keepPinned) el.scrollTop=el.scrollHeight;
    frameId=requestAnimationFrame(play);
  }

  return {
    append(chunk){
      queue.push(...Array.from(chunk));
      if(frameId===null) frameId=requestAnimationFrame(play);
    },
    finish(rawText){
      finalText=rawText;
      return new Promise(resolve=>{
        finishResolver=resolve;
        if(frameId===null) play();
      });
    },
  };
}

/* ============================================================ 生成 (SSE流式) ============================================================ */
async function generate(){
  if(generating||!currentData) return;
  generating=true;
  const showThinking=thinkingEnabled;
  const btn=document.getElementById('genBtn');
  const btnText=document.getElementById('genBtnText');
  const thinkToggle=document.getElementById('thinkToggle');
  btn.disabled=true;
  thinkToggle.disabled=true;
  btnText.innerHTML='<span style="display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite"></span> 生成中...';

  // 显示引擎区
  document.getElementById('engineIdle').style.display='none';
  resetAgentTrace();
  document.getElementById('dualPanel').style.display='flex';
  document.getElementById('panelThinking').style.display=showThinking?'':'none';
  document.getElementById('thinkingBody').innerHTML='';
  document.getElementById('outputBody').innerHTML='';
  document.getElementById('menuOut').style.display='none';
  document.getElementById('reachCard').style.display='none';
  document.getElementById('valueCard').style.display='none';
  document.getElementById('engineStatus').textContent='生成中...';
  document.getElementById('thinkingBadge').textContent='等待思考...';
  document.getElementById('outputBadge').textContent='等待生成';

  // 窄屏或页面已滚走时，把工作流区带回视野
  requestAnimationFrame(()=>{
    const engineCard=document.querySelector('.engine-card');
    const rect=engineCard.getBoundingClientRect();
    if(rect.top<64||rect.top>window.innerHeight*0.45){
      const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      engineCard.scrollIntoView({behavior:reduceMotion?'auto':'smooth',block:'start'});
    }
  });

  let thinkingText='';
  let outputText='';
  let terminalReceived=false;
  currentRawThinking='';
  const thinkingRenderer=showThinking?createStreamRenderer('thinkingBody'):null;
  const outputRenderer=createStreamRenderer('outputBody');

  try{
    const resp=await fetch('/api/generate',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({data:currentData,enable_thinking:showThinking}),
    });

    if(!resp.ok) throw new Error(`生成请求失败 (${resp.status})`);
    if(!resp.body) throw new Error('浏览器未收到流式响应');

    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';

    while(true){
      const{done,value}=await reader.read();
      if(done) break;
      buffer+=decoder.decode(value,{stream:true});

      // 解析 SSE 事件
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';

      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        try{
          const evt=JSON.parse(line.slice(6));
          if(evt.type==='status'){
            renderWorkflowStatus(evt.content);
          }else if(evt.type==='agent'){
            renderAgentEvent(evt.content);
          }else if(evt.type==='thinking'&&showThinking){
            thinkingText+=evt.content;
            document.getElementById('thinkingBadge').textContent='思考中...';
            thinkingRenderer.append(evt.content);
          }else if(evt.type==='token'){
            outputText+=evt.content;
            document.getElementById('outputBadge').textContent='生成中...';
            outputRenderer.append(evt.content);
          }else if(evt.type==='done'){
            terminalReceived=true;
            const result=evt.content;
            currentResult=result.result;
            recipeUrls=result.recipe_urls||{};
            currentPlanId=result.plan_id||null;
            if(result.input_context){
              inventoryPage=0;
              renderDataViz(result.input_context);
            }
            currentRawThinking=thinkingText;
            // 让待播放文字完整显示后再切换到最终 Markdown，避免大段跳出。
            await Promise.all([
              showThinking?thinkingRenderer.finish(thinkingText):Promise.resolve(),
              outputRenderer.finish(outputText),
            ]);
            if(showThinking){
              if(thinkingText.trim()){
                document.getElementById('thinkingBadge').textContent='完成';
              }else{
                document.getElementById('thinkingBadge').textContent='无推理内容';
                renderStaticMarkdown('thinkingBody','','模型未返回可展示的推理内容。');
              }
            }
            document.getElementById('outputBadge').textContent='完成';
            renderResult(result);
            document.getElementById('engineStatus').textContent='⏳ 待负责人确认';
            completeWorkflowStage(
              'workflow-save',
              `${result.mock_mode?'Mock 模式 · ':''}方案已保存 · Memory: ${result.memory_count} 条`,
            );
          }else if(evt.type==='error'){
            terminalReceived=true;
            await Promise.all([
              showThinking?thinkingRenderer.finish(thinkingText):Promise.resolve(),
              outputRenderer.finish(outputText),
            ]);
            failWorkflowStage(evt.content);
            document.getElementById('engineStatus').textContent='错误';
            if(showThinking) document.getElementById('thinkingBadge').textContent='错误';
            document.getElementById('outputBadge').textContent='错误';
            showToast('生成失败：'+evt.content,'error',5200);
          }
        }catch(e){}
      }
    }
    if(!terminalReceived) throw new Error('生成流提前结束，未收到完成状态');
  }catch(e){
    await Promise.all([
      showThinking?thinkingRenderer.finish(thinkingText):Promise.resolve(),
      outputRenderer.finish(outputText),
    ]);
    failWorkflowStage(`连接失败: ${e.message}`);
    document.getElementById('engineStatus').textContent='错误';
    if(showThinking) document.getElementById('thinkingBadge').textContent='错误';
    document.getElementById('outputBadge').textContent='错误';
    showToast('生成失败：'+e.message,'error',5200);
  }finally{
    generating=false;
    btn.disabled=false;
    thinkToggle.disabled=false;
    btnText.textContent='重新生成';
  }
}
