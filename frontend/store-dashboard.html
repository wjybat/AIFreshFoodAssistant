<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>门店负责人决策大屏</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f3f5f1;--surface:#fff;--ink:#1d2924;--muted:#68756e;--line:#dfe6df;--deep:#21342c;--green:#16865d;--green-l:#e7f5ee;--orange:#e45b33;--orange-l:#fff0e9;--red:#cc4536;--red-l:#fff0ed;--amber:#a36b08;--amber-l:#fff6df;--shadow:0 4px 18px rgba(32,52,44,.08)}
body{font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5}.shell{max-width:1440px;margin:0 auto;padding:18px 22px 42px}
button{font:inherit;cursor:pointer;border:0}.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:0 0 17px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:11px}.brand-mark{width:34px;height:34px;display:grid;place-items:center;background:var(--deep);color:#fff;border-radius:7px;font-size:17px}.brand h1{font-size:18px;letter-spacing:0}.brand p{font-size:11px;color:var(--muted);margin-top:1px}.back-btn{padding:8px 11px;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--muted);font-size:12px}
.hero{display:flex;align-items:end;justify-content:space-between;gap:18px;margin:22px 0}.eyebrow{font-size:11px;color:var(--green);font-weight:800;letter-spacing:0}.hero h2{font-size:25px;line-height:1.25;margin-top:4px}.hero p{font-size:13px;color:var(--muted);margin-top:5px}.state{padding:7px 10px;border-radius:6px;font-size:12px;font-weight:700;white-space:nowrap}.state.waiting{background:var(--amber-l);color:var(--amber)}.state.accepted{background:var(--green-l);color:var(--green)}.state.rejected{background:var(--red-l);color:var(--red)}
.summary{display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:12px;margin-bottom:14px}.metric{background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:15px;box-shadow:var(--shadow);overflow:hidden}.metric strong{display:block;font-size:14px;line-height:1.3;color:var(--deep);overflow-wrap:anywhere;word-break:break-word}.metric:first-child strong{font-size:12px;line-height:1.35}.metric span{display:block;font-size:11px;color:var(--muted);margin-top:6px}.metric.good strong{color:var(--green)}.metric.warm strong{color:var(--orange)}
.layout{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.panel{background:var(--surface);border:1px solid var(--line);border-radius:7px;box-shadow:var(--shadow)}.panel-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}.panel-head h3{font-size:14px}.panel-head span{font-size:11px;color:var(--muted)}.panel-body{padding:15px 16px}.package-list{display:grid;gap:9px}.package{display:flex;align-items:center;gap:10px;padding:10px;background:#f8faf7;border-radius:6px}.dish-icon{width:34px;height:34px;display:grid;place-items:center;background:#fff;border:1px solid var(--line);border-radius:6px;font-size:18px}.dish-info{flex:1}.dish-name{font-size:13px;font-weight:800}.dish-meta{font-size:11px;color:var(--muted);margin-top:2px}.dish-price{font-size:13px;color:var(--orange);font-weight:800}.display-map{position:relative;height:260px;background:#edf2ec;border:1px dashed #cdd8cc;border-radius:6px;overflow:hidden}.map-label{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;border-radius:5px;color:#fff;text-align:center;line-height:1.3;overflow:hidden;word-break:break-word}.map-label strong{font-size:12px;font-weight:800}.map-label span{display:-webkit-box;max-width:100%;overflow:hidden;-webkit-box-orient:vertical;-webkit-line-clamp:3;font-size:11px;font-weight:650}.map-entry{left:12px;top:12px;width:56%;height:70px;background:#537c9c}.map-main{left:12px;top:94px;width:56%;height:152px;background:var(--green)}.map-side{right:12px;top:12px;width:35%;height:96px;background:var(--orange)}.map-cooked{right:12px;top:120px;width:35%;height:126px;background:#b27b32}.map-caption{font-size:11px;color:var(--muted);margin-top:9px}.task-list{display:grid;gap:8px}.task{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}.task:last-child{border-bottom:0}.task-no{width:23px;height:23px;display:grid;place-items:center;border-radius:5px;background:var(--green-l);color:var(--green);font-size:11px;font-weight:800;flex-shrink:0}.task b{display:block;font-size:12px}.task span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
.feedback-field{display:grid;gap:7px;margin-top:13px}.feedback-field label{font-size:12px;font-weight:800;color:var(--ink)}.feedback-field textarea{width:100%;min-height:92px;resize:vertical;border:1px solid var(--line);border-radius:6px;background:#f8faf7;padding:10px 11px;color:var(--ink);font:12px/1.55 "PingFang SC","Microsoft YaHei",system-ui,sans-serif;outline:none}.feedback-field textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,134,93,.1);background:#fff}.feedback-field textarea::placeholder{color:#97a39c}.feedback-field small{font-size:10.5px;color:var(--muted)}
.decision{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 16px;margin-top:14px;background:var(--deep);color:#fff;border-radius:7px}.decision-copy b{display:block;font-size:13px}.decision-copy span{display:block;font-size:11px;color:#b7c9be;margin-top:2px}.decision-actions{display:flex;gap:9px}.accept,.reject{padding:9px 14px;border-radius:6px;font-size:12px;font-weight:800}.accept{background:#43bd82;color:#103e2a}.reject{background:transparent;border:1px solid #7b9386;color:#fff}.accept:disabled,.reject:disabled{opacity:.55;cursor:not-allowed}.message{margin-top:12px;padding:10px 12px;border-radius:6px;font-size:12px}.message.ok{background:var(--green-l);color:var(--green)}.message.no{background:var(--red-l);color:var(--red)}.error{padding:48px 12px;text-align:center;color:var(--muted);font-size:13px}
@media(max-width:900px){.summary{grid-template-columns:repeat(2,1fr)}.summary .metric:first-child{grid-column:1/-1}.layout{grid-template-columns:1fr}}@media(max-width:560px){.shell{padding:14px}.topbar{align-items:flex-start}.hero{align-items:flex-start;flex-direction:column}.hero h2{font-size:21px}.decision{align-items:flex-start;flex-direction:column}.decision-actions{width:100%}.decision-actions button{flex:1}.summary{gap:9px}.metric{padding:12px}}
</style>
</head>
<body>
<main class="shell"><header class="topbar"><div class="brand"><div class="brand-mark">🏪</div><div><h1>门店负责人决策大屏</h1><p>AI生鲜助手 · 方案执行确认</p></div></div><button class="back-btn" onclick="history.back()">返回运营驾驶舱</button></header><div id="dashboard"><div class="error">正在加载今日推荐方案...</div></div></main>
<script>
const planId=new URLSearchParams(location.search).get('plan_id');
const escapeHtml=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
let activePlan=null;
let managerFeedback='';

function decisionLabel(decision){return decision==='accepted'?'已接受执行':decision==='rejected'?'已拒绝执行':'待负责人确认';}
function mapLabel(value,fallback){return escapeHtml(value||fallback);}
function estimateText(metric,key){if(!metric||typeof metric!=='object')return metric||'-';const value=metric.value;if(typeof value!=='number'||!Number.isFinite(value))return '-';const formatted=value.toLocaleString('zh-CN',{maximumFractionDigits:1});if(metric.unit==='元'||metric.unit==='CNY')return `¥${formatted}`;if(metric.unit==='%')return `${key==='ticket_lift'&&value>0?'+':''}${formatted}%`;return `${formatted}${metric.unit||''}`;}
function renderDashboard(plan){
  activePlan=plan;const result=plan.result||{};const estimate=result.value_estimate||{};const decision=plan.decision||'waiting';const locked=decision!=='waiting';
  const menus=(result.menus||[]).map(dish=>`<div class="package"><div class="dish-icon">${escapeHtml(dish.emoji||'🍳')}</div><div class="dish-info"><div class="dish-name">${escapeHtml(dish.dish)}</div><div class="dish-meta">${escapeHtml(dish.role||'推荐菜品')} · ${escapeHtml(dish.cook_time||'即配即做')}</div></div><div class="dish-price">¥${escapeHtml(dish.package_price)}</div></div>`).join('');
  const tasks=(result.staff_instructions||[]).map((task,index)=>`<div class="task"><div class="task-no">${index+1}</div><div><b>${escapeHtml(task.task)}</b><span>完成时限：${escapeHtml(task.deadline||'按门店节奏执行')}</span></div></div>`).join('');
  const map=result.display_plan||{};
  document.getElementById('dashboard').innerHTML=`
    <section class="hero"><div><div class="eyebrow">TODAY'S AI RECOMMENDATION</div><h2>${escapeHtml(result.scenario_tag||'今日门店推荐方案')}</h2><p>${escapeHtml(plan.input_context?.store_info?.store_name||'当前门店')} · 方案生成于 ${new Date(plan.created_at).toLocaleString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</p></div><span class="state ${decision}">${decisionLabel(plan.decision)}</span></section>
    <section class="summary"><div class="metric"><strong>${escapeHtml(result.cross_sell||'今日推荐组合')}</strong><span>组合与菜谱方案</span></div><div class="metric good"><strong>${escapeHtml(estimateText(estimate.loss_reduction,'loss_reduction'))}</strong><span>预计减损</span></div><div class="metric warm"><strong>${escapeHtml(estimateText(estimate.ticket_lift,'ticket_lift'))}</strong><span>客单价提升</span></div><div class="metric"><strong>${escapeHtml(estimateText(estimate.cross_sell_rate,'cross_sell_rate'))}</strong><span>预计连带率</span></div></section>
    <section class="layout"><div class="panel"><div class="panel-head"><h3>系统推荐组合商品与菜谱</h3><span>${(result.menus||[]).length} 道菜</span></div><div class="panel-body"><div class="package-list">${menus||'<div class="error">暂无菜品方案</div>'}</div></div></div>
    <div class="panel"><div class="panel-head"><h3>建议陈列图</h3><span>门店动线</span></div><div class="panel-body"><div class="display-map"><div class="map-label map-entry"><strong>入口</strong><span>${mapLabel(map.entrance,'场景包入口')}</span></div><div class="map-label map-main"><strong>主推堆头</strong><span>${mapLabel(map.main,'今日推荐')}</span></div><div class="map-label map-side"><strong>配菜区</strong><span>${mapLabel(map.side,'配菜区')}</span></div><div class="map-label map-cooked"><strong>熟食联动</strong><span>${mapLabel(map.cooked,'熟食联动')}</span></div></div><p class="map-caption">入口引流，主推岛台承接，配菜与熟食形成连带动线。</p></div></div>
    <div class="panel"><div class="panel-head"><h3>员工执行指令</h3><span>下发后可执行</span></div><div class="panel-body"><div class="task-list">${tasks||'<div class="error">暂无员工任务</div>'}</div></div></div>
    <div class="panel"><div class="panel-head"><h3>确认执行</h3><span>决策将写入 Memory</span></div><div class="panel-body"><p style="font-size:12px;color:var(--muted)">接受后将记录为成功样例，拒绝后将记录为失败样例；未确认前不会写入 Memory。</p><div class="feedback-field"><label for="managerFeedback">门店负责人反馈</label><textarea id="managerFeedback" maxlength="500" placeholder="填写菜品组合、价格、陈列或执行效果等反馈" oninput="managerFeedback=this.value">${escapeHtml(managerFeedback)}</textarea><small>反馈将用于后续 Memory 沉淀与 Skills 优化（当前为前端展示）。</small></div></div></div></section>
    <section class="decision"><div class="decision-copy"><b>${locked?'该方案已完成决策':'是否执行当前推荐方案？'}</b><span>${locked?'当前决策已被记录，不能重复变更。':'确认后将把方案状态写入历史样例。'}</span></div><div class="decision-actions"><button class="reject" onclick="submitDecision(false)" ${locked?'disabled':''}>拒绝</button><button class="accept" onclick="submitDecision(true)" ${locked?'disabled':''}>接受并执行</button></div></section><div id="decisionMessage"></div>`;
  if(locked){showDecisionMessage(decision,plan.memory_case_id,true);}
}

function showDecisionMessage(decision,memoryCaseId,existing=false){const accepted=decision==='accepted';document.getElementById('decisionMessage').innerHTML=`<div class="message ${accepted?'ok':'no'}">${accepted?'已接受并下发执行，已写入成功 Memory 样例':'已拒绝当前方案，已写入失败 Memory 样例'}${memoryCaseId?`（#${memoryCaseId}）`:''}${existing?'。':''}</div>`;}
async function submitDecision(accepted){
  if(!activePlan)return;document.querySelectorAll('.decision-actions button').forEach(button=>button.disabled=true);
  try{const response=await fetch(`/api/recommendations/${encodeURIComponent(planId)}/decision`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accepted})});if(!response.ok)throw new Error('提交决策失败');const outcome=await response.json();activePlan.decision=outcome.decision;activePlan.memory_case_id=outcome.memory_case_id;renderDashboard(activePlan);showDecisionMessage(outcome.decision,outcome.memory_case_id,outcome.already_decided);}
  catch(error){document.querySelectorAll('.decision-actions button').forEach(button=>button.disabled=false);document.getElementById('decisionMessage').innerHTML=`<div class="message no">${escapeHtml(error.message)}，请重试。</div>`;}
}
async function init(){if(!planId){document.getElementById('dashboard').innerHTML='<div class="error">缺少推荐方案，请从运营驾驶舱进入。</div>';return;}try{const response=await fetch(`/api/recommendations/${encodeURIComponent(planId)}`);if(!response.ok)throw new Error('方案不存在');renderDashboard(await response.json());setTimeout(fitMetrics,50);}catch(error){document.getElementById('dashboard').innerHTML=`<div class="error">${escapeHtml(error.message)}，请返回运营驾驶舱重新生成。</div>`;}}
function fitMetrics(){document.querySelectorAll('.metric strong').forEach(function(el){var fs=parseInt(getComputedStyle(el).fontSize)||14;while(el.scrollHeight>el.clientHeight&&fs>9){fs-=0.5;el.style.fontSize=fs+'px';}});}
init();
</script>
</body>
</html>
