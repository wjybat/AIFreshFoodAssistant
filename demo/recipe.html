<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>菜谱详情 · AI社区餐桌</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0ea5a4; --brand-d:#0d8b8a; --brand-l:#e6f7f6;
  --warm:#f97316; --warm-l:#fff3ea;
  --red:#ef4444; --red-l:#fdeaea;
  --ink:#1a2332; --ink2:#5a6577; --ink3:#8a95a8;
  --line:#e6eaf0; --line2:#eef2f7;
}
body{font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;background:#f4f6f9;color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
.recipe-page{max-width:520px;margin:0 auto;background:#fff;min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,.06)}
/* 顶部 */
.rp-hero{padding:32px 20px 24px;text-align:center;position:relative}
.rp-hero .rp-emoji{font-size:64px;line-height:1;margin-bottom:10px}
.rp-hero h1{font-size:24px;font-weight:800;margin-bottom:8px}
.rp-hero .rp-badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.rp-hero .rp-badge{font-size:11.5px;padding:4px 12px;border-radius:8px;font-weight:600;background:rgba(255,255,255,.7);color:var(--ink2);backdrop-filter:blur(4px)}
/* 元信息 */
.rp-meta{display:flex;padding:0;border-bottom:1px solid var(--line2)}
.rp-meta-item{flex:1;text-align:center;padding:14px 4px;border-right:1px solid var(--line2)}
.rp-meta-item:last-child{border-right:none}
.rp-meta-item .v{font-size:16px;font-weight:700;color:var(--brand-d)}
.rp-meta-item .l{font-size:11px;color:var(--ink3);margin-top:3px}
/* 区块 */
.rp-section{padding:18px 20px;border-bottom:1px solid var(--line2)}
.rp-section h2{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
/* 食材 */
.rp-ingr{display:flex;flex-direction:column;gap:0}
.rp-ingr-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px dotted var(--line2)}
.rp-ingr-row:last-child{border-bottom:none}
.rp-ingr-row .nm{font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.rp-ingr-row .nm .dot{width:6px;height:6px;border-radius:50%;background:var(--brand)}
.rp-ingr-row .amt{font-size:14px;color:var(--brand-d);font-weight:600}
.rp-ingr-row .note{font-size:11px;color:var(--ink3);margin-left:8px}
/* 步骤 */
.rp-steps{counter-reset:step;list-style:none}
.rp-steps li{position:relative;padding:10px 0 10px 42px;font-size:14px;line-height:1.7;border-bottom:1px dotted var(--line2)}
.rp-steps li:last-child{border-bottom:none}
.rp-steps li::before{counter-increment:step;content:counter(step);position:absolute;left:0;top:9px;width:30px;height:30px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
/* 贴士 */
.rp-tips{background:var(--warm-l);border-radius:12px;padding:14px 16px;font-size:13.5px;line-height:1.7;color:#92400e}
.rp-tips b{color:#78350f}
/* 来源 */
.rp-source{padding:18px 20px;text-align:center;background:var(--brand-l)}
.rp-source .logo{font-size:20px;margin-bottom:6px}
.rp-source .name{font-size:14px;font-weight:700;color:var(--brand-d)}
.rp-source .desc{font-size:11.5px;color:var(--ink2);margin-top:4px}
.rp-source .pkg{margin-top:10px;display:inline-block;background:var(--warm);color:#fff;font-size:12px;padding:6px 16px;border-radius:8px;font-weight:600}
/* 加载/错误 */
.rp-loading{padding:60px 20px;text-align:center;color:var(--ink3)}
.rp-loading .big{font-size:48px;margin-bottom:12px}
.rp-error{padding:40px 20px;text-align:center;color:var(--red)}
</style>
</head>
<body>
<div class="recipe-page" id="recipePage">
  <div class="rp-loading">
    <div class="big">🍳</div>
    <p>加载菜谱中...</p>
  </div>
</div>

<script src="data.js"></script>
<script>
function getParam(name){
  const u=new URL(window.location.href);
  return u.searchParams.get(name);
}

function render(){
  const sKey=getParam('s')||'s1';
  const dIdx=parseInt(getParam('d')||'0');
  const s=SCENARIOS[sKey];

  if(!s||!s.menu||!s.menu[dIdx]){
    document.getElementById('recipePage').innerHTML=
      '<div class="rp-error"><div style="font-size:48px;margin-bottom:12px">😕</div><p>菜谱未找到</p><p style="font-size:12px;margin-top:8px;color:var(--ink3)">请检查链接是否正确</p></div>';
    return;
  }

  const d=s.menu[dIdx];
  const r=d.recipe;
  if(!r){
    document.getElementById('recipePage').innerHTML=
      '<div class="rp-error"><p>该菜品暂无详细菜谱</p></div>';
    return;
  }

  const title=document.title=d.name+' · 菜谱';
  document.getElementById('recipePage').innerHTML=`
    <div class="rp-hero" style="background:${d.bg}">
      <div class="rp-emoji">${d.emoji}</div>
      <h1>${d.name}</h1>
      <div class="rp-badges">
        <span class="rp-badge" style="background:${d.badgeColor}25;color:${d.badgeColor}">${d.badge}</span>
        <span class="rp-badge">${r.servings}</span>
        <span class="rp-badge">⏱️ ${r.time}</span>
        <span class="rp-badge">${r.difficulty}</span>
      </div>
    </div>
    <div class="rp-meta">
      <div class="rp-meta-item"><div class="v">${r.servings}</div><div class="l">分量</div></div>
      <div class="rp-meta-item"><div class="v">${r.time}</div><div class="l">用时</div></div>
      <div class="rp-meta-item"><div class="v">${r.difficulty}</div><div class="l">难度</div></div>
      <div class="rp-meta-item"><div class="v">${r.calories}</div><div class="l">热量</div></div>
    </div>
    <div class="rp-section">
      <h2>🥬 食材清单</h2>
      <div class="rp-ingr">
        ${r.ingredients.map(ing=>`
          <div class="rp-ingr-row">
            <div class="nm"><span class="dot"></span>${ing.name}${ing.note?`<span class="note">${ing.note}</span>`:''}</div>
            <div class="amt">${ing.amount}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="rp-section">
      <h2>👩‍🍳 制作步骤</h2>
      <ol class="rp-steps">
        ${r.steps.map(st=>`<li>${st}</li>`).join('')}
      </ol>
    </div>
    <div class="rp-section">
      <h2>💡 小贴士</h2>
      <div class="rp-tips">${r.tips}</div>
    </div>
    <div class="rp-source">
      <div class="logo">🍽️</div>
      <div class="name">AI生鲜助手</div>
      <div class="desc">本菜谱由 AI 根据超市当日库存智能生成 · 即时烹饪场景经营</div>
      ${s.package?`<div class="pkg">${s.package.title} · ¥${s.package.now}</div>`:''}
    </div>
  `;
}

render();
</script>
</body>
</html>
